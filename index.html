<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NAVI">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data: blob:; connect-src https://api.anthropic.com; font-src 'self' data:">
<title>NAVI — Your AI Performance Coach</title>
<meta name="description" content="NAVI — training, nutrition, sleep and recovery in one conversational AI coach.">
<meta name="theme-color" content="#0d0d0d">
<link rel="apple-touch-icon" href="navi-icon.png">
<link rel="icon" type="image/png" href="navi-icon.png">
<style>
  :root{
    --page:#0d0d0d;
    --surface:#1a1a19;
    --surface-2:#232322;
    --surface-3:#2c2c2a;
    --ink:#ffffff;
    --ink-2:#c3c2b7;
    --muted:#96948d;
    --hairline:rgba(255,255,255,0.10);
    --grid:#2c2c2a;
    --baseline:#383835;
    --accent:#3987e5;
    --accent-deep:#184f95;
    --aqua:#199e70;
    --gold:#c98500;
    --violet:#9085e9;
    --good:#0ca30c;
    --warning:#fab219;
    --critical:#d03b3b;
    --radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overscroll-behavior:none}
  body{
    background:var(--page);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
  }
  body.light{
    --page:#f4f4f1; --surface:#ffffff; --surface-2:#efefec; --surface-3:#e4e4e0;
    --ink:#0d0d0d; --ink-2:#43423d; --muted:#74726b;
    --hairline:rgba(11,11,11,.12); --grid:#e1e0d9; --baseline:#c3c2b7;
  }
  body.light nav{background:rgba(250,250,248,.94)}
  body.light .briefing{background:linear-gradient(160deg,#e7eefb,#ffffff 70%);border-color:rgba(42,120,214,.4)}
  body.light .briefing .b-stat{background:rgba(11,11,11,.04)}
  body.light .suggest{background:linear-gradient(160deg,#e3f4ec,#ffffff 75%);border-color:rgba(14,122,84,.4)}
  body.light .suggest h3{color:#0e7a54}
  body.light .msg.user{color:#fff}
  body.light input.f-chip[type=date]{color-scheme:light}
  body.light #sum-overlay{background:rgba(244,244,241,.92)}
  body.light .toast{box-shadow:0 8px 24px rgba(0,0,0,.15)}
  /* ---------- phone frame ---------- */
  #phone{
    width:100%;max-width:412px;height:100dvh;max-height:880px;
    background:var(--page);
    display:flex;flex-direction:column;overflow:hidden;position:relative;
  }
  @media(min-width:480px){
    #phone{border:1px solid var(--hairline);border-radius:36px;height:92vh;box-shadow:0 24px 80px rgba(0,0,0,.6)}
  }
  @supports(padding: env(safe-area-inset-bottom)){
    nav{padding-bottom:calc(6px + env(safe-area-inset-bottom))}
    header{padding-top:calc(18px + env(safe-area-inset-top))}
  }
  /* ---------- header ---------- */
  header{
    padding:18px 20px 12px;display:flex;align-items:center;gap:12px;flex:none;
  }
  .logo{
    width:38px;height:38px;border-radius:12px;flex:none;
    background:linear-gradient(135deg,#3987e5,#184f95);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;letter-spacing:.5px;
  }
  header h1{font-size:17px;font-weight:700;letter-spacing:.2px}
  header .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .pill{
    font-size:11px;font-weight:600;color:var(--ink-2);
    border:1px solid var(--hairline);border-radius:999px;padding:5px 10px;
    display:flex;align-items:center;gap:5px;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good)}
  /* ---------- screens ---------- */
  main{flex:1;overflow:hidden;position:relative}
  .screen{position:absolute;inset:0;overflow-y:auto;padding:4px 16px 20px;display:none;scrollbar-width:none}
  .screen::-webkit-scrollbar{display:none}
  .screen.active{display:block}
  #screen-coach{display:none;padding:0}
  #screen-coach.active{display:flex;flex-direction:column}
  /* ---------- cards ---------- */
  .card{
    background:var(--surface);border:1px solid var(--hairline);
    border-radius:var(--radius);padding:16px;margin-bottom:12px;
  }
  .card h3{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:12px;letter-spacing:.2px}
  .card h3 .h3-side{float:right;font-weight:500;color:var(--muted);font-size:12px}
  .section-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin:18px 4px 10px}
  /* ---------- chat ---------- */
  #chat-scroll{flex:1;overflow-y:auto;padding:8px 16px 12px;display:flex;flex-direction:column;gap:10px;scrollbar-width:none}
  #chat-scroll::-webkit-scrollbar{display:none}
  .msg{max-width:82%;padding:11px 14px;border-radius:18px;font-size:15px;line-height:1.45;white-space:pre-wrap;animation:pop .18s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.bot{background:var(--surface);border:1px solid var(--hairline);border-bottom-left-radius:6px;align-self:center;width:94%;max-width:94%;color:var(--ink)}
  .msg.user{background:var(--accent);border-bottom-right-radius:6px;align-self:flex-end}
  .msg{position:relative}
  .msg.bot{padding-right:30px}
  .msg-back{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;opacity:.55;padding:2px;line-height:1}
  .msg-back:hover{opacity:1;color:var(--accent)}
  .msg .tag{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--accent);margin-bottom:5px;text-transform:uppercase}
  .msg.user .tag{display:none}
  .msg b{font-weight:650}
  #hist-toggle{position:sticky;top:6px;z-index:6;align-self:center;background:var(--surface-2);box-shadow:0 2px 10px rgba(0,0,0,.35);border:1px solid var(--hairline);border-radius:999px;color:var(--muted);font-size:12px;font-weight:700;font-family:inherit;padding:7px 14px;cursor:pointer;margin-bottom:2px;flex:none}
  #hist-toggle:active{background:var(--surface-2)}
  .typing{align-self:flex-start;background:var(--surface);border:1px solid var(--hairline);border-radius:18px;border-bottom-left-radius:6px;padding:14px 16px;display:flex;gap:5px}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}
  /* briefing card inside chat */
  .briefing{
    align-self:center;width:94%;max-width:94%;
    background:linear-gradient(160deg,#1d2a3d,#1a1a19 70%);
    border:1px solid rgba(57,135,229,.35);border-radius:18px;padding:16px;animation:pop .25s ease;
  }
  .briefing .b-head{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--accent);text-transform:uppercase;margin-bottom:10px}
  .briefing .b-stats{display:flex;gap:8px;margin-bottom:10px}
  .b-stat{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--hairline);border-radius:12px;padding:10px}
  .b-stat .v{font-size:17px;font-weight:700}
  .b-stat .l{font-size:11px;color:var(--muted);margin-top:2px}
  .briefing p{font-size:14px;line-height:1.5;color:var(--ink-2)}
  .briefing p b{color:var(--ink)}
  /* chips + input */
  .chip{
    flex:none;font-size:13px;font-weight:600;color:var(--accent);
    background:rgba(57,135,229,.12);border:1px solid rgba(57,135,229,.35);
    border-radius:999px;padding:8px 14px;cursor:pointer;white-space:nowrap;
  }
  .chip:active{transform:scale(.96)}
  #inputbar{display:flex;gap:8px;padding:10px 16px 16px;flex:none}
  #inputbar input{
    flex:1;background:var(--surface-2);border:1px solid var(--hairline);border-radius:999px;
    padding:12px 16px;color:var(--ink);font-size:15px;outline:none;font-family:inherit;
  }
  #inputbar input::placeholder{color:var(--muted)}
  #send{
    width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);
    color:#fff;font-size:17px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;
  }
  #send:active{transform:scale(.94)}
  /* ---------- tab bar ---------- */
  nav{
    flex:none;display:flex;border-top:1px solid var(--hairline);background:rgba(13,13,13,.92);
    backdrop-filter:blur(12px);padding:6px 4px calc(8px + env(safe-area-inset-bottom));
  }
  nav button{
    flex:1;background:none;border:none;color:var(--muted);font-family:inherit;
    font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;
  }
  nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  nav button.active{color:var(--accent)}
  /* ---------- train ---------- */
  .feel{
    flex:1;text-align:center;padding:10px 4px;border-radius:12px;font-size:13px;font-weight:600;
    background:var(--surface);border:1px solid var(--hairline);color:var(--ink-2);cursor:pointer;
  }
  .feel.sel{background:rgba(57,135,229,.15);border-color:var(--accent);color:var(--accent)}
  .exercise{padding:14px 16px}
  .ex-top{display:flex;align-items:flex-start;gap:8px}
  .ex-name{font-size:15px;font-weight:650;flex:1}
  .ex-name .sub-note{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-top:2px}
  .swap{
    border:1px solid var(--hairline);background:none;color:var(--muted);border-radius:10px;
    font-size:12px;font-weight:600;padding:6px 10px;cursor:pointer;font-family:inherit;flex:none;
  }
  .ex-meta{display:flex;gap:14px;margin-top:8px;font-size:13px;color:var(--muted)}
  .ex-meta b{color:var(--ink-2);font-weight:600}
  .ex-meta .target b{color:var(--accent)}
  .sets{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .set-btn{
    min-width:74px;padding:9px 10px;border-radius:12px;border:1px dashed var(--baseline);
    background:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;
  }
  .set-btn.done{border:1px solid rgba(12,163,12,.5);background:rgba(12,163,12,.10);color:var(--ink);border-style:solid}
  .set-btn.done .chk{color:var(--good);font-weight:800}
  .pr-flag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.5px;color:#0d0d0d;background:var(--warning);border-radius:6px;padding:2px 6px;margin-left:6px;vertical-align:2px}
  #rest-timer{
    position:absolute;left:50%;bottom:86px;transform:translateX(-50%);
    background:var(--surface-3);border:1px solid var(--hairline);border-radius:999px;
    padding:9px 18px;font-size:14px;font-weight:700;display:none;align-items:center;gap:8px;z-index:5;
    box-shadow:0 8px 24px rgba(0,0,0,.5);
  }
  #rest-timer.on{display:flex}
  #rest-timer span{color:var(--accent);font-variant-numeric:tabular-nums}
  /* ---------- fuel meters ---------- */
  .meter{margin-bottom:14px}
  .meter:last-child{margin-bottom:2px}
  .meter .m-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
  .meter .m-row .lab{color:var(--ink-2);font-weight:600;display:flex;align-items:center;gap:7px}
  .meter .m-row .lab i{width:9px;height:9px;border-radius:3px;display:inline-block}
  .meter .m-row .val{color:var(--muted)}
  .meter .m-row .val b{color:var(--ink);font-weight:650}
  .track{height:10px;border-radius:999px;overflow:hidden}
  .fill{height:100%;border-radius:999px;transition:width .5s ease}
  .meal{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--hairline)}
  .meal:last-child{border-bottom:none;padding-bottom:2px}
  .meal .ic{width:36px;height:36px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
  .meal .m-name{font-size:14px;font-weight:600}
  .meal .m-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .meal .m-cal{margin-left:auto;font-size:13px;color:var(--ink-2);font-weight:600;white-space:nowrap}
  .suggest{
    background:linear-gradient(160deg,#14291f,#1a1a19 75%);border:1px solid rgba(25,158,112,.4);
  }
  .suggest h3{color:#3ecf96}
  .suggest p{font-size:14px;line-height:1.5;color:var(--ink-2)}
  .suggest p b{color:var(--ink)}
  .rest-card{flex:none;width:150px;background:var(--surface-2);border:1px solid var(--hairline);border-radius:12px;padding:11px}
  .rest-card .r-n{font-size:13px;font-weight:650}
  .rest-card .r-i{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}
  .rest-card .r-m{font-size:11px;font-weight:700;color:#3ecf96;margin-top:6px}
  /* ---------- progress ---------- */
  .tiles{display:flex;gap:10px;margin-bottom:12px}
  .tile{flex:1;background:var(--surface);border:1px solid var(--hairline);border-radius:14px;padding:12px}
  .tile .t-l{font-size:11px;color:var(--muted);font-weight:600}
  .tile .t-v{font-size:20px;font-weight:700;margin-top:4px}
  .tile .t-d{font-size:11px;font-weight:600;margin-top:3px;color:var(--good)}
  .chart-wrap{position:relative}
  .chart-wrap svg{display:block;width:100%;height:auto}
  #tooltip{
    position:fixed;pointer-events:none;z-index:50;display:none;
    background:var(--surface-3);border:1px solid var(--hairline);border-radius:10px;
    padding:8px 11px;font-size:12px;line-height:1.45;box-shadow:0 8px 24px rgba(0,0,0,.5);
    color:var(--ink-2);white-space:nowrap;
  }
  #tooltip b{color:var(--ink);font-weight:650}
  /* ---------- profile ---------- */
  .prof-head{display:flex;align-items:center;gap:14px;padding:6px 4px 16px}
  .avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#3987e5,#9085e9);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px}
  .prof-head .p-name{font-size:18px;font-weight:700}
  .prof-head .p-sub{font-size:13px;color:var(--muted);margin-top:2px}
  .goal-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex:1;scroll-behavior:smooth}
  .goal-scroll::-webkit-scrollbar{display:none}
  .goal-scroll .goal{flex:none;white-space:nowrap}
  .goal{
    font-size:13px;font-weight:600;padding:8px 13px;border-radius:999px;cursor:pointer;
    background:var(--surface-2);border:1px solid var(--hairline);color:var(--ink-2);
  }
  .goal.sel{background:rgba(57,135,229,.15);border-color:var(--accent);color:var(--accent)}
  .persona{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
  .persona::-webkit-scrollbar{display:none}
  .p-card{
    flex:none;width:118px;background:var(--surface-2);border:1px solid var(--hairline);
    border-radius:14px;padding:12px;cursor:pointer;
  }
  .p-card.sel{border-color:var(--accent);background:rgba(57,135,229,.12)}
  .p-card .p-e{font-size:22px}
  .p-card .p-t{font-size:13px;font-weight:650;margin-top:6px}
  .p-card .p-d{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.35}
  .mem{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--hairline);font-size:13px;color:var(--ink-2);line-height:1.45;align-items:flex-start}
  .mem:last-child{border-bottom:none}
  .mem .m-ic{flex:none;font-size:14px;margin-top:1px}
  .mem .del{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;flex:none;padding:0 2px}
  .wear{display:flex;align-items:center;gap:12px}
  .wear .w-ic{width:38px;height:38px;border-radius:11px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:17px}
  .wear .w-n{font-size:14px;font-weight:600}
  .wear .w-s{font-size:12px;color:var(--good);margin-top:1px}
  /* ---------- train: active / upcoming / completed ---------- */
  .exercise.upcoming{opacity:.45}
  .exercise.complete{opacity:.45;border-color:rgba(12,163,12,.4)}
  .exercise.active{border-color:rgba(57,135,229,.55);box-shadow:0 0 0 1px rgba(57,135,229,.22)}
  .set-line{display:flex;align-items:center;gap:8px;padding:11px 13px;border-radius:12px;font-size:13px;font-weight:600;margin-top:8px;border:1px dashed var(--baseline);color:var(--muted)}
  .set-line.done{border:1px solid rgba(12,163,12,.5);background:rgba(12,163,12,.10);color:var(--ink);cursor:pointer;border-style:solid}
  .set-line.done .hr{margin-left:auto;color:#e66767;font-weight:700;font-size:12px;white-space:nowrap}
  .set-go{width:100%;margin-top:8px;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
  .set-go:active{transform:scale(.985)}
  .set-go.end{background:var(--critical);animation:pulse 1.6s infinite}
  .endwork{width:100%;margin-top:10px;padding:13px;border-radius:12px;border:1px solid var(--good);background:rgba(12,163,12,.15);color:#3ecf96;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
  .ctl-row{display:flex;gap:16px;margin-top:10px;align-items:center}
  /* v72: uniform 2×2 grid for Weight / Sets / Reps / Rest on every exercise card */
  .ctl-row.ctl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-top:10px}
  .ctl-row.ctl-grid .ctl{display:grid;grid-template-columns:40px 26px minmax(0,1fr) 26px 14px;align-items:center;gap:4px}
  .ctl-row.ctl-grid .ctl .lb-f{width:100%;min-width:0;box-sizing:border-box}
  .ctl-row .ctl{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600}
  .ctl-row .adj-btn{width:26px;height:26px;font-size:13px;border-radius:8px}
  .ctl-row b{color:var(--ink);font-variant-numeric:tabular-nums;font-size:13px}
  .done-flag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.5px;color:#0d0d0d;background:var(--good);border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:2px}
  .empty-state{text-align:center;padding:44px 24px}
  .empty-state .e-ic{font-size:38px}
  .empty-state h4{font-size:16px;font-weight:700;margin:12px 0 6px}
  .empty-state p{font-size:13px;color:var(--muted);line-height:1.55}
  /* ---------- progress filters + medals ---------- */
  .filter-row{display:flex;gap:8px;margin:2px 0 12px}
  .f-chip{flex:1;text-align:center;font-size:12px;font-weight:600;padding:7px 0;border-radius:10px;background:var(--surface);border:1px solid var(--hairline);color:var(--muted);cursor:pointer}
  .f-chip.sel{background:rgba(57,135,229,.15);border-color:var(--accent);color:var(--accent)}
  .tile .t-d.neg{color:#3ecf96}
  .badges{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .badge{background:var(--surface-2);border:1px solid var(--hairline);border-radius:14px;padding:12px 8px;text-align:center}
  .badge.locked{opacity:.38}
  .badge .b-e{font-size:24px}
  .badge .b-n{font-size:12px;font-weight:700;margin-top:6px}
  .badge .b-s{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.35}
  /* ---------- community ---------- */
  .post-head .u{font-size:14px;font-weight:650}
  .post-head .t{font-size:12px;color:var(--muted);margin-top:1px}
  .act{background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;padding:0}
  .act.liked{color:#e66767}
  .cmts.open{display:block}
  /* ---------- guided flow buttons + cardio timer + set adjuster ---------- */
  .btn-panel{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  /* v57: exactly 3 options → 2 up top, 3rd spans the full row */
  .btn-panel .opt-btn:nth-child(3):last-child{flex-basis:100%;max-width:100%}
  .btn-panel .opt-btn:nth-child(5):last-child{flex-basis:100%;max-width:100%}   /* weigh-in day: 5th option owns its row */
  .opt-btn{
    flex:1 1 calc(50% - 4px);max-width:calc(50% - 4px);min-width:110px;height:56px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;

  .opt-btn[style*="flex:1 1 100%"], .opt-btn[style*="flex: 1 1 100%"]{max-width:100%}

  .opt-btn.begin{flex:1 1 100%;background:var(--good);border-color:var(--good);font-size:15px}
  .opt-btn.learn{flex:1 1 calc(50% - 4px);max-width:calc(50% - 4px);min-width:110px;height:44px;padding:6px 10px;font-size:12px;font-weight:600;background:none;border-color:var(--hairline);color:var(--muted)}
  /* ---------- onboarding form ---------- */
  .ob-form{display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .ob-row{display:flex;gap:8px}
  .ob-field{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
  .ob-field label{font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--muted);text-transform:uppercase}
  .ob-field input,.ob-field select{
    background:var(--surface-2);border:1px solid var(--hairline);border-radius:10px;
    padding:10px 12px;color:var(--ink);font-size:14px;font-family:inherit;outline:none;width:100%;
  }
  .ob-field input:focus,.ob-field select:focus{border-color:var(--accent)}
  .acct-links{display:flex;flex-direction:column;gap:2px;margin-top:12px}
  .acct-links a{color:var(--accent);font-size:13px;font-weight:600;text-decoration:none;padding:9px 0;border-bottom:1px solid var(--hairline)}
  .acct-links a:last-child{border-bottom:none}
  .wd-row{display:flex;gap:6px}
  .wd-chip{flex:1;padding:9px 0;border-radius:10px;background:var(--surface-2);border:1px solid var(--hairline);color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
  .wd-chip.sel{background:rgba(57,135,229,.15);border-color:var(--accent);color:var(--accent)}
  .ob-submit{border:none;background:var(--accent);color:#fff;border-radius:12px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;margin-top:2px}
  /* session timer bar */
  .sess-bar{display:flex;align-items:center;gap:10px;margin-top:12px}
  .sess-bar .s-time{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;min-width:74px}
  .sess-bar .s-lab{font-size:11px;color:var(--muted)}
  /* v102: slim sticky vitals bar — keeps clock/sets/burn in view mid-session */
  .sess-mini{position:sticky;top:0;z-index:40;height:38px;margin-bottom:-38px;display:flex;align-items:center;gap:10px;padding:0 14px;border-radius:12px;background:var(--surface-2);border:1px solid var(--hairline);box-shadow:0 8px 20px rgba(0,0,0,.28);font-size:12px;font-weight:700;opacity:0;transform:translateY(-8px);transition:opacity .18s ease, transform .18s ease;pointer-events:none;visibility:hidden}
  .sess-mini.show{opacity:1;transform:none;visibility:visible;pointer-events:auto}
  .sess-mini .sm-time{font-variant-numeric:tabular-nums;color:var(--accent);font-size:14px}
  body.light .sess-mini{box-shadow:0 8px 20px rgba(0,0,0,.12)}
  .sess-btn.start{background:var(--good);border-color:var(--good);color:#fff}
  .sess-btn.stop{background:rgba(208,59,59,.15);border-color:var(--critical)}
  /* v115: rest is a floating mini window — the session stays adjustable behind it */
  #rest-overlay{
    position:absolute;left:14px;right:14px;bottom:8px;z-index:45;display:none;flex-wrap:wrap;justify-content:center;align-items:center;gap:8px;
    background:var(--surface-2);border:1px solid var(--hairline);border-radius:16px;padding:12px 16px;
    box-shadow:0 14px 34px rgba(0,0,0,.5);backdrop-filter:blur(10px);text-align:center;
  }
  #rest-overlay.on{display:flex}
  #rest-overlay .ro-label{font-size:11px;font-weight:800;letter-spacing:1.2px;color:var(--accent);flex:1 1 100%}
  #rest-overlay .ro-count{font-size:40px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;flex:1 1 100%}
  #rest-overlay.go .ro-count{color:var(--warning)}
  #rest-overlay .ro-sub{display:none}
  #sum-overlay{position:absolute;inset:0;z-index:46;display:none;align-items:center;justify-content:center;background:rgba(10,10,10,.9);backdrop-filter:blur(8px);padding:20px}
  #sum-overlay.on{display:flex}
  .sum-card{background:var(--surface);border:1px solid var(--hairline);border-radius:20px;padding:20px;width:100%;max-height:80%;overflow-y:auto}
  .sum-card .b-stats{display:flex;gap:8px}
  .sum-card .b-stat{flex:1;background:var(--surface-2);border:1px solid var(--hairline);border-radius:12px;padding:10px}
  .sum-card .b-stat .v{font-size:17px;font-weight:700}
  .sum-card .b-stat .l{font-size:11px;color:var(--muted);margin-top:2px}
  .sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--hairline);font-size:13px;gap:10px}
  .sum-row:last-child{border-bottom:none}
  .sum-row .up{color:#3ecf96;font-weight:700;white-space:nowrap}
  .sum-row .dn{color:var(--warning);font-weight:700;white-space:nowrap}
  .sum-row .na{color:var(--muted);font-weight:600;white-space:nowrap}
  #rest-overlay .ro-btn{margin-top:0;padding:10px 8px;border-radius:10px;border:1px solid var(--hairline);background:var(--surface-3);color:var(--ink);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;flex:1 1 calc(50% - 8px);white-space:nowrap}
  #rest-timer.go-count{background:var(--accent);border-color:var(--accent);font-size:18px;padding:12px 26px}
  #rest-timer.go-go{background:var(--good);border-color:var(--good);font-size:18px;padding:12px 26px}
  /* date picker chip */
  input.f-chip[type=date]{color-scheme:dark;font-family:inherit;background:var(--surface);outline:none}
  /* custom builder */
  .cb-head{display:flex;gap:6px;margin-top:12px;font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--muted);text-transform:uppercase}
  .cb-row{display:flex;gap:6px;margin-top:7px}
  .cb-row select,.cb-row input{background:var(--surface-2);border:1px solid var(--hairline);border-radius:10px;padding:9px 8px;color:var(--ink);font-size:12px;font-family:inherit;outline:none}
  .cb-row select{flex:2;min-width:0}
  .cb-row .cb-sets{flex:none;width:52px;text-align:center}
  .cb-row .cb-reps{flex:none;width:58px;text-align:center}
  .cb-row .cb-w{flex:none;width:58px;text-align:center}
  .swap-row{display:flex;gap:8px;margin-top:12px;align-items:center}
  .swap-row select{flex:1;background:var(--surface-2);border:1px solid var(--hairline);border-radius:10px;padding:9px;color:var(--ink);font-size:13px;font-family:inherit;outline:none;min-width:0}
  .meal-items{flex:1 1 100%;margin-top:8px;margin-left:48px;border-left:2px solid var(--hairline);padding-left:10px}
  .meal-item{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-2);padding:3px 0}
  .meal-item span:last-child{color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  .meal .ic.num{background:rgba(57,135,229,.15);color:var(--accent);font-weight:800;font-size:15px}
  .cardio-live .c-timer{font-size:42px;font-weight:700;text-align:center;margin:10px 0 4px;font-variant-numeric:tabular-nums}
  .cardio-live .c-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px}
  .cardio-live .c-gps{text-align:center;font-size:13px;font-weight:650;color:var(--accent);margin:-2px 0 6px;font-variant-numeric:tabular-nums}
  .cardio-live .c-splits{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:8px}
  .cardio-live .c-splits span{font-size:11px;font-weight:700;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--hairline);border-radius:999px;padding:3px 9px}
  .cardio-live .c-row{display:flex;gap:8px}
  .cardio-live .c-row .opt-btn.end{background:rgba(208,59,59,.15);border-color:var(--critical)}
  .adj-row{display:flex;align-items:center;gap:8px;margin-top:12px;background:var(--surface-2);border:1px solid var(--hairline);border-radius:12px;padding:10px}
  .adj-row .adj-val{font-size:14px;font-weight:700;flex:1;text-align:center;font-variant-numeric:tabular-nums}
  .adj-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--hairline);background:var(--surface-3);color:var(--ink);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;flex:none;position:relative}
  /* v102: invisible halo lifts the tap target to ~44pt without changing the look */
  .adj-btn::before{content:'';position:absolute;inset:-6px}
  .ctl-row .adj-btn::before{inset:-9px}
  .adj-save{border:none;background:var(--accent);color:#fff;border-radius:10px;padding:0 14px;height:34px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;flex:none}
  .adj-lab{font-size:11px;color:var(--muted);text-align:center;margin-top:3px}
  .spr-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .spr-lab{width:52px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .swatch.sel{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
  .cwheel{width:44px;height:30px;border:1px solid var(--hairline);border-radius:8px;background:var(--surface-2);padding:2px;cursor:pointer}
  .ob-spin{display:flex;min-width:0;align-items:stretch;background:var(--surface-2);border:1px solid var(--hairline);border-radius:10px;overflow:hidden}
  .ob-spin:focus-within{border-color:var(--accent)}
  .ob-field .ob-spin input{flex:1;min-width:0;width:auto;background:none;border:none;border-radius:0;padding:10px 8px}
  .ob-spin .spin-col button{width:20px}
  .spin-col{display:flex;flex-direction:column;border-left:1px solid var(--hairline);flex:none}
  .spin-col button{flex:1;width:24px;background:var(--surface-3);border:none;color:var(--ink-2);font-size:8px;cursor:pointer;padding:0;line-height:1;font-family:inherit}
  .spin-col button:first-child{border-bottom:1px solid var(--hairline)}
  .spin-col button:active{background:var(--accent);color:#fff}
  .spr-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  .mg-head{font-size:11px;font-weight:800;letter-spacing:.8px;color:var(--accent);text-transform:uppercase;margin:16px 4px 2px}
  .set-undo{width:100%;margin-top:6px;background:none;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;padding:4px}
  .set-undo:hover{color:var(--accent)}
  /* ---------- pixel lifter HUD animations ---------- */
  #hud-fig{width:30px;height:30px;position:relative;flex:none}
  #hud-fig svg{position:absolute;inset:0}
  #spr-rest{display:none}
  #hud-fig.rest #spr-active{display:none}
  #hud-fig.rest #spr-rest{display:block}
  @keyframes bbLift{0%{transform:translateY(0)}25%{transform:translateY(3px)}55%{transform:translateY(-2px)}80%{transform:translateY(1px)}100%{transform:translateY(0)}}
  @keyframes hudJump{0%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}55%{transform:translateY(0)}70%{transform:translateY(-2px)}85%{transform:translateY(0)}}
  @keyframes hudBounce{0%,100%{transform:translateY(0) scaleY(1)}40%{transform:translateY(1px) scaleY(.92)}70%{transform:translateY(-3px) scaleY(1.04)}}
  #hud-fig.lift #bb{animation:bbLift .9s steps(5) 2}
  #hud-fig.lift #body{animation:hudBounce .9s steps(4) 2}
  #hud-fig.jump #spr-active{animation:hudJump .8s steps(6) 2}
  @keyframes hudWalk{0%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(-2px)}60%{transform:translateX(7px)}80%{transform:translateX(3px)}100%{transform:translateX(0)}}
  #hud-fig.walk #spr-active{animation:hudWalk 2.4s steps(10)}
  @keyframes hudStep{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
  #hud-fig.walk #body{animation:hudStep .3s steps(2) 8}
  @keyframes hudLunge{0%,100%{transform:translate(0,0) scaleY(1)}30%{transform:translate(2px,2px) scaleY(.86)}50%{transform:translate(2px,0) scaleY(1)}75%{transform:translate(-2px,2px) scaleY(.86)}}
  #hud-fig.lunge #body{animation:hudLunge 1.8s steps(8)}
  #hud-fig.lunge #bb{animation:hudLunge 1.8s steps(8)}
  @keyframes sweatDrip{0%{opacity:0;transform:translateY(0)}30%{opacity:1}100%{opacity:0;transform:translateY(5px)}}
  #hud-fig.rest #sweat1{animation:sweatDrip 1.6s steps(4) infinite}
  #hud-fig.rest #sweat2{animation:sweatDrip 1.6s steps(4) .8s infinite}
  @keyframes restBreathe{0%,100%{transform:translateY(0)}50%{transform:translateY(1px)}}
  #hud-fig.rest #spr-rest{animation:restBreathe 2.4s steps(2) infinite}
  /* ---------- v22: two-frame scenes, training calendar, memory scroll ---------- */
  [data-scene="pushup"] #sB{animation:scnFrA 1.1s steps(1) infinite}
  [data-scene="pushup"] #sC{animation:scnFrB 1.1s steps(1) infinite}
  @keyframes scnFrA{0%,49.9%{opacity:1}50%,100%{opacity:0}}
  @keyframes scnFrB{0%,49.9%{opacity:0}50%,100%{opacity:1}}
  @keyframes confFall{0%{transform:translateY(0) rotate(0deg);opacity:1}85%{opacity:1}100%{transform:translateY(760px) rotate(560deg);opacity:0}}
  [data-scene="jumprope"] #sB{animation:scnFrA .55s steps(1) infinite}
  [data-scene="jumprope"] #sC{animation:scnFrB .55s steps(1) infinite}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
  .cal-dow{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.5px}
  .cal-day{font-size:12px;padding:6px 0;border-radius:8px;color:var(--ink-2);font-variant-numeric:tabular-nums;border:1px solid transparent}
  .cal-day.worked{background:rgba(57,135,229,.16);border-color:rgba(57,135,229,.45);color:var(--accent);font-weight:700}
  .cal-day.today{border-color:var(--warning)}
  .cal-day.future{opacity:.32}
  .mem-scroll{max-height:200px;overflow-y:auto;scrollbar-width:thin;margin-right:-6px;padding-right:6px}
  /* ---------- v21 context scenes — the coach acts out the moment ---------- */
  [data-scene="flex"] #sB{animation:scnPump 1.6s steps(3) infinite}
  @keyframes scnPump{0%,100%{transform:translateY(0)}50%{transform:translateY(1px)}}
  [data-scene="chalk"] #sB{animation:scnWrite 1.1s steps(3) infinite}
  [data-scene="chalk"] #sC{animation:scnBlink 1.8s steps(2) infinite}
  @keyframes scnWrite{0%,100%{transform:translate(0,0)}35%{transform:translate(1px,0)}70%{transform:translate(0,1px)}}
  [data-scene="bench"] #sB{animation:scnPress 1.5s steps(4) infinite}
  @keyframes scnPress{0%,100%{transform:translateY(0)}50%{transform:translateY(2px)}}
  [data-scene="squat"] #sB{transform-origin:8px 14px;animation:scnSquat 1.9s steps(5) infinite}
  @keyframes scnSquat{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.84)}}
  [data-scene="curl"] #sB{animation:scnCurl 1.3s steps(4) infinite}
  @keyframes scnCurl{0%,100%{transform:translateY(0)}55%{transform:translateY(-3px)}}
  [data-scene="run"] #sB, [data-scene="bike"] #sB{animation:scnJog .5s steps(2) infinite}
  @keyframes scnJog{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
  [data-scene="run"] #sC, [data-scene="swim"] #sC{animation:scnBlink .7s steps(2) infinite}
  @keyframes scnBlink{0%,100%{opacity:1}50%{opacity:.12}}
  [data-scene="swim"] #sB{animation:scnSwim 1.4s steps(4) infinite}
  @keyframes scnSwim{0%,100%{transform:translate(0,0)}50%{transform:translate(2px,1px)}}
  [data-scene="stair"] #sB{animation:scnClimb 1.2s steps(3) infinite}
  @keyframes scnClimb{0%{transform:translate(-2px,2px)}100%{transform:translate(1px,-1px)}}
  [data-scene="ellip"] #sB{animation:scnGlide 1s steps(3) infinite}
  @keyframes scnGlide{0%,100%{transform:translate(0,0)}50%{transform:translate(1px,-1px)}}
  [data-scene="eat"] #sB{animation:scnEat 1.2s steps(3) infinite}
  @keyframes scnEat{0%,100%{transform:translate(0,0)}50%{transform:translate(1px,-2px)}}
  [data-scene="cook"] #sB{animation:scnSteam 1.7s steps(4) infinite}
  @keyframes scnSteam{0%{opacity:0;transform:translateY(2px)}40%{opacity:1}100%{opacity:0;transform:translateY(-3px)}}
  [data-scene="cook"] #sC{animation:scnJiggle 2.4s steps(3) infinite}
  @keyframes scnJiggle{0%,100%{transform:translateX(0)}50%{transform:translateX(1px)}}
  [data-scene="ohp"] #sB{animation:scnFrA 1.4s steps(1) infinite}
  [data-scene="ohp"] #sC{animation:scnFrB 1.4s steps(1) infinite}
  /* v54: per-muscle-group scenes all run the two-frame swap */
  [data-scene^="mg"] #sB{animation:scnFrA 1.1s steps(1) infinite}
  [data-scene^="mg"] #sC{animation:scnFrB 1.1s steps(1) infinite}
  [data-scene="grow"] #sB{animation:scnFrA 1.7s steps(1) infinite}
  [data-scene="grow"] #sC{animation:scnFrB 1.7s steps(1) infinite}
  [data-scene="tailor"] #sB{animation:scnFrA 1.5s steps(1) infinite}
  [data-scene="tailor"] #sC{animation:scnFrB 1.5s steps(1) infinite}
  [data-scene="stroll"] #sB{animation:scnFrA .6s steps(1) infinite}
  [data-scene="stroll"] #sC{animation:scnFrB .6s steps(1) infinite}
  [data-scene="stretch"] #sB{animation:scnFrA 1.8s steps(1) infinite}
  [data-scene="stretch"] #sC{animation:scnFrB 1.8s steps(1) infinite}
  [data-scene="wave"] #sB{animation:scnFrA .7s steps(1) infinite}
  [data-scene="wave"] #sC{animation:scnFrB .7s steps(1) infinite}
  #ob-spr-prev #sB{animation:scnFrA .7s steps(1) infinite}
  #ob-spr-prev #sC{animation:scnFrB .7s steps(1) infinite}
  [data-scene="heartbeat"] #sB{animation:scnFrA .55s steps(1) infinite}
  [data-scene="heartbeat"] #sC{animation:scnFrB .55s steps(1) infinite}
  [data-scene="sleepbed"] #sB{animation:scnFrA .9s steps(1) infinite}
  [data-scene="sleepbed"] #sC{animation:scnFrB .9s steps(1) infinite}
  [data-scene="plateload"] #sB{animation:scnFrA 1.3s steps(1) infinite}
  [data-scene="plateload"] #sC{animation:scnFrB 1.3s steps(1) infinite}
  [data-scene="scalewin"] #sB{animation:scnFrA 1.5s steps(1) infinite}
  [data-scene="scalewin"] #sC{animation:scnFrB 1.5s steps(1) infinite}
  [data-scene="pedestal"] #sB{animation:scnFrA 1.6s steps(1) infinite}
  [data-scene="pedestal"] #sC{animation:scnFrB 1.6s steps(1) infinite}
  /* v55: toweling-off recovery — slow swap + sweat drips */
  [data-scene="recover"] #sB{animation:scnFrA 2.2s steps(1) infinite}
  [data-scene="recover"] #sC{animation:scnFrB 2.2s steps(1) infinite}
  [data-scene="recover"] #swA{animation:sweatDrip 1.6s steps(4) infinite}
  [data-scene="recover"] #swB{animation:sweatDrip 1.6s steps(4) .8s infinite}
  /* photo button */
  #photo-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--hairline);background:var(--surface-2);color:var(--ink-2);font-size:17px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center}
  .msg.user img{max-width:100%;border-radius:12px;display:block;margin-top:4px}
  /* ---------- v3 additions ---------- */
  .attach-pill .x{color:var(--muted);cursor:pointer;font-weight:700}
  .md-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--hairline);font-size:13px}
  .md-row:last-child{border-bottom:none}
  .md-row .d{color:var(--muted);width:58px;flex:none}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* v104: every cardio activity is tracked separately on the Progress tab */
function ensureCardioDS(){
  [['run','Outdoor Running'],['tread','Treadmill'],['stair','Stair Stepper'],['ellip','Elliptical'],['bikein','Indoor Cycling'],['bikeout','Outdoor Cycling'],['swim','Swimming']].forEach(([t,nm])=>{
    const k = 'cd_'+t;
    if(!state.strengthData[k]) state.strengthData[k] = {name:nm, mg:'Cardio', vals:[], reps:null, unit:'min', hr:[], cal:[], dist:[], weeks:[]};
  });
  Object.values(state.strengthData).forEach(ds=>{ if(!ds.dist) ds.dist = []; if(!ds.cal) ds.cal = []; });
  /* v105: race PBs get clean names, 10K joins, weekly-minutes is retired */
  Object.entries({mile:'Mile', fivek:'5K', halfm:'Half Marathon', marathon:'Marathon'}).forEach(([k,nm])=>{ if(state.strengthData[k]) state.strengthData[k].name = nm; });
  if(!state.strengthData.tenk) state.strengthData.tenk = {name:'10K', mg:'Cardio', vals:[], reps:null, unit:'min', invert:true, hr:[], cal:[], dist:[]};
  delete state.strengthData.cardio;
  if(state.strengthKey === 'cardio') state.strengthKey = 'mile';
  /* canonical Cardio ordering in the picker: races first, then the activities */
  const cOrd = ['mile','fivek','tenk','halfm','marathon','cd_run','cd_tread','cd_stair','cd_ellip','cd_bikein','cd_bikeout','cd_swim'];
  const rebuilt = {};
  Object.entries(state.strengthData).forEach(([k,v])=>{ if(!cOrd.includes(k)) rebuilt[k] = v; });
  cOrd.forEach(k=>{ if(state.strengthData[k]) rebuilt[k] = state.strengthData[k]; });
  state.strengthData = rebuilt;
}
ensureCardioDS();

/* grouped <option> list shared by the progress chart and rankings */
function groupedExOptions(sel){
  const groups = {};
  Object.entries(state.strengthData).forEach(([k,v])=>{ const g = v.mg||'Other'; (groups[g]=groups[g]||[]).push([k,v.name]); });
  const order = Object.keys(groups).filter(g=>g!=='Cardio').sort().concat(groups['Cardio']?['Cardio']:[]);
  return order.map(g=>`<optgroup label="${g}">${groups[g].map(([k,n])=>`<option value="${k}" ${k===sel?'selected':''}>${n}</option>`).join('')}</optgroup>`).join('');
}

function applyPreset(key){
  const p = PRESETS[key];
  state.sessionName = p.name;
  /* v77: loading a new workout resets the session clock & record flag — two-a-days work */
  if(!state.sess.run){ state.sessRecorded = false; state.sess = {run:false, paused:false, sec:0}; }
  state.exercises = p.seg
    ? p.seg.map(s=>({n:s, seg:true, sets:1, done:[], target:{w:'',r:''}, last:'—'}))
    : p.ex.map(e=>({...e, target:{...e.target}, done:[]}));
  /* v50: presets are prescriptions, not history — 'last time' comes only from YOUR logs */
  if(!p.seg){
    state.exercises.forEach(e=>{
      if(e.seg) return;
      const m = state.medals.find(x=>x.n===e.n);
      if(m && m.pr !== '—'){
        e.last = m.pr;
        e.pr = parseFloat(m.pr)||0;
        if(typeof e.target.w==='number' && e.pr) e.target.w = Math.round(e.pr/2.5)*2.5;
        e.note = '';
      } else {
        e.last = '—'; e.note = ''; e.pr = 0;
      }
    });
  }
  /* v33: the plan adapts — deload on plateau, trim on low recovery, cut volume on short sleep */
  if(!p.seg){
    const lowRec = state.hasWearable && state.recovery.score < 60;
    const shortSleep = state.hasWearable && state.recovery.sleepH && state.recovery.sleepH < 7;
    state.exercises.forEach(e=>{
      if(e.cardioSeg) return;
      const stall = state.stalls[e.n]||0;
      if(stall >= 3 && typeof e.target.w==='number'){
        e.target.w = Math.max(5, Math.round(e.target.w*0.9/2.5)*2.5);
        e.note = `Deload — ${stall} sessions stuck at this weight. −10% today, planned, to rebuild momentum`;
        return;
      }
      if(lowRec && typeof e.target.w==='number'){
        e.target.w = Math.max(5, Math.round(e.target.w*0.9/2.5)*2.5);
        e.note = `Recovery ${state.recovery.score}% — loads trimmed ~10% today`;
      }
      if(shortSleep && e.comp && e.sets > 3){
        e.sets = e.sets - 1;
        e.note = (e.note ? e.note+' · ' : '') + 'short sleep — one compound set trimmed';
      }
    });
  }
  state.sessRecorded = false;
  state.trainDate = 'Today';
  state.planReady = true;
  renderTrain();
}

function hideInput(){ $('#inputbar').style.display='none'; }
function showInput(){ $('#inputbar').style.display='flex'; }

function workoutInfo(key){
  const p = PRESETS[key];
  if(!p) return 'No details on that one yet.';
  const lifts = (p.ex||[]).filter(e=>!e.seg);
  const lines = lifts.map(e=>`• <b>${e.n}</b> — ${e.sets} × ${e.target.r}${typeof e.target.w==='number'?` @ ${e.target.w} lb`:''}`).join('\n');
  const muscles = [...new Set(lifts.map(e=>NAME2MG[e.n]).filter(Boolean))].join(' · ');
  const setsTotal = lifts.reduce((a,e)=>a+e.sets,0);
  const mins = Math.round(setsTotal * 3.2 + 30);
  return `<b>${p.name}</b> — ${lifts.length} exercises, ${setsTotal} working sets, then 30 min incline cardio.\n\n${lines}\n\n🎯 <b>Targets:</b> ${muscles}\n⏱ <b>~${mins} min</b> including rest · compounds first, isolation after, 2–3 s eccentrics throughout`;
}

function handleFlowChoice(k, label){
  if(FLOW[k]){ setTimeout(()=>showFlow(k), 380); return; }
  if(k.startsWith('c:')){ setTimeout(()=>cardioSetup(k.slice(2), label), 380); return; }
  if(k==='custom'){ setTimeout(showCustomBuilder, 380); return; }
  if(k==='act:weigh'){
    showInput(); pendingIntent = 'weighin';
    setTimeout(()=>{ promptBubble(`It's ${TODAY_NAME} — one of your weigh-in days. ⚖️ Step on the scale and give me the number.`, ()=>{ pendingIntent = null; }); inputEl.focus(); }, 380);
    return;
  }
  if(k==='act:food'){
    setTimeout(showFoodOptions, 380);
    return;
  }
  if(k==='act:ask'){
    showInput();
    setTimeout(()=>{ promptBubble(`Ask me anything — or <b>tell</b> me anything, and I'll adjust your plan around it. For example: <i>"what's best for glutes?"</i> · <i>"my shoulder is hurting today"</i> · <i>"I want to lose 2 lb per week — adjust my calories"</i>`); inputEl.focus(); }, 380);
    return;
  }
  const from = lastFlowKey;
  applyPreset(k);
  state.splitChosen = true;
  if(['ppl','bro','fb'].includes(from)) state.lastSplit = from;
  const FREQ = {ppl:6, bro:4, fb:3};
  let freqNote = '';
  if(FREQ[from] && state.workoutsGoal !== FREQ[from]){
    state.workoutsGoal = FREQ[from];
    retuneMacros(); renderFuel();
    state.memory.unshift({ic:'📅', t:`${from==='ppl'?'PPL':from==='bro'?'Bro split':'Full-body'} rhythm — ${FREQ[from]} sessions/week goal`});
    freqNote = ` That split sets your weekly rhythm: <b>${FREQ[from]} sessions/week</b> is now your goal.`;
    updateHud();
  }
  showInput();
  const f = flav();
  setTimeout(()=>{
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = `<span class="tag">${state.coachName} · ${flav().t}</span>` + (k==='recoveryDay'
      ? `${pick(f.open)} Recovery day loaded — walk, stretch, foam roll, meal prep, early lights-out. Rest is where growth happens.`
      : `${pick(f.open)} <b>${state.sessionName}</b> is loaded — hit <b>Start set</b> on the Train tab when you're at the gym and I'll run the clock and rest timers.${freqNote} ${f.push}`)
      + `<div class="btn-panel" style="margin-top:10px"><button class="opt-btn learn" data-gb="${from||'root'}">← Go back — pick something else</button></div>`;
    chatEl.appendChild(d); scrollChat();
    d.querySelector('[data-gb]').onclick = ev=>{
      ev.target.disabled = true; ev.target.classList.add('dim');
      showFlow(ev.target.dataset.gb);
    };
    showTrainCountdown(6);
  }, 380);
}

/* v115: the wait to Train is visible and skippable — countdown with a start-now button */
function showTrainCountdown(sec=6){
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.style.background = 'none'; d.style.border = 'none'; d.style.padding = '0';
  d.innerHTML = `<div class="btn-panel" style="margin-top:2px"><button class="opt-btn" data-gonow="1" style="flex:1 1 100%;max-width:100%;background:var(--accent);border-color:var(--accent);color:#fff;white-space:nowrap;flex-direction:row;gap:5px">▶ Begin workout now — <b style="font-variant-numeric:tabular-nums" id="tt-count">${sec}</b></button></div>`;
  chatEl.appendChild(d); scrollChat();
  const endTs = Date.now() + sec*1000;
  let done = false;
  const go = ()=>{
    if(done) return; done = true;
    clearInterval(t);
    const b = d.querySelector('[data-gonow]');
    if(b){ b.disabled = true; b.classList.add('dim'); b.innerHTML = '✓ In the gym — Train tab'; }
    switchTab('train');
  };
  const t = setInterval(()=>{
    const s = Math.max(0, Math.ceil((endTs - Date.now())/1000));
    const el = d.querySelector('#tt-count');
    if(el) el.textContent = s;
    if(s <= 0) go();
  }, 250);
  d.querySelector('[data-gonow]').onclick = go;
}

    d.querySelector(`[data-cdn="${c.k}"]`).onclick = ()=>{ vals[c.k] = Math.max(c.k==='inc' ? 0 : c.step, +(vals[c.k]-c.step).toFixed(1)); d.querySelector(`[data-cv="${c.k}"]`).value = vals[c.k]; };
    d.querySelector(`[data-cup="${c.k}"]`).onclick = ()=>{ vals[c.k] = +(vals[c.k]+c.step).toFixed(1); d.querySelector(`[data-cv="${c.k}"]`).value = vals[c.k]; };
    d.querySelector(`[data-cv="${c.k}"]`).onchange = ev=>{
      let v = parseFloat(ev.target.value);
      if(isNaN(v)){ ev.target.value = vals[c.k]; return; }
      v = c.k==='dur' ? Math.max(1, Math.round(v)) : c.k==='speed' ? Math.max(0.1, Math.round(v*10)/10) : c.k==='inc' ? Math.max(0, Math.round(v*2)/2) : Math.max(c.step, Math.round(v));
      vals[c.k] = v; ev.target.value = v;
    };
  });
  d.querySelector('#cs-back').onclick = ()=>{
    d.querySelectorAll('button').forEach(x=>{ x.disabled = true; x.classList.add('dim'); });
    showFlow('cardio');
  };
  d.querySelector('.begin').onclick = ()=>{
    d.querySelectorAll('button').forEach(x=>{ x.disabled = true; x.classList.add('dim'); });
    d.querySelector('.begin').classList.remove('dim'); d.querySelector('.begin').classList.add('sel');
    cardioLive(type, name, cfg, vals);
  };
}

function cardioLive(type, name, cfg, vals){
  clearInterval(cardioT);
  hideRestOverlay();
  const [,, gps, basePace] = CARDIO_TARGETS[type];
  state.cardio = { type, name, gps, basePace, cfg, vals, mode: vals.mode||'down', dur: vals.dur||30, sec:0, dist:0, cal:0, paused:false, splits:[], lastSplit:0, on:true, anchor:Date.now(), accum:0 };
  state.sessionName = name;
  switchTab('train');
  renderTrain();
  showInput();
  cardioT = setInterval(()=>{
    const c = state.cardio;
    if(!c || !c.on || c.paused) return;
    /* wall-clock anchored: catch up every second that passed while backgrounded */
    const trueSec = c.accum + Math.floor((Date.now() - c.anchor)/1000);
    while(c.sec < trueSec){
      c.sec++;
      c.cal += 0.16;
      if(c.gps){
        c.dist += 1/(c.basePace + 16*Math.sin(c.sec/35));
        if(Math.floor(c.dist) > c.splits.length){
          c.splits.push(c.sec - c.lastSplit); c.lastSplit = c.sec;
          const sEl = $('#ct-splits');
          if(sEl) sEl.innerHTML += `<span>Km ${c.splits.length} — ${fmtPace(c.splits[c.splits.length-1])}</span>`;
        }
      }
      if(c.mode==='down' && c.sec >= c.dur*60){ toast('⏱ Time — session complete'); endCardio(); return; }
    }
    const cEl = $('#ct-cal');
    if(cEl) cEl.textContent = `🔥 ~${Math.round(c.cal)} kcal est.`;
    const shown = c.mode==='down' ? Math.max(0, c.dur*60 - c.sec) : c.sec;
    const tEl = $('#ct-timer');
    if(tEl) tEl.textContent = `${String(Math.floor(shown/60)).padStart(2,'0')}:${String(shown%60).padStart(2,'0')}`;
    if(c.gps){
      const gEl = $('#ct-gps');
      if(gEl) gEl.textContent = `${c.dist.toFixed(2)} km · ${fmtPace(c.basePace + 16*Math.sin(c.sec/35))}/km · avg ${fmtPace(c.sec/Math.max(c.dist,0.001))}`;
    }
  }, 1000);
}

function endCardio(){
  const c = state.cardio; if(!c) return;
  clearInterval(cardioT);
  c.on = false;
  transientScene('recover', 14000);
  const mins = Math.floor(c.sec/60), s = c.sec%60;
  const maxHr = state.hasWearable ? 148 + Math.floor(Math.random()*22) : 0;
  const avgHr = maxHr ? maxHr - 8 - Math.floor(Math.random()*6) : 0;
  state.burned += Math.round(c.cal);
  /* v104: the session lands in its own Progress dataset — time, distance, HR, kcal */
  const cds = state.strengthData['cd_'+c.type];
  if(cds && c.sec >= 30){
    cds.vals.push(+(c.sec/60).toFixed(1));
    cds.hr.push(maxHr||0);
    cds.cal.push(Math.round(c.cal));
    cds.dist.push(+cardioKm(c).toFixed(2));
    cds.weeks = cds.weeks || [];
    cds.weeks.push(simDate().toLocaleDateString('en-US',{month:'short', day:'numeric'}));
  }
  /* v80: lifetime distance + cardio-type coverage */
  if(c.gps && c.dist > 0) state.lifeKm = +((state.lifeKm||0) + c.dist).toFixed(2);
  state.cardioTypes = state.cardioTypes || [];
  if(!state.cardioTypes.includes(c.type)) state.cardioTypes.push(c.type);
  /* distance & pace medals from this cardio session */
  if(c.gps && c.dist > 0){
    checkMedals(c.dist >= 1.609 ? { km: c.dist, sec: c.sec, mileSec: Math.round(c.sec/(c.dist/1.609)) } : { km: c.dist, sec: c.sec });
  }
  if(c.segIdx==null){
    state.workoutsWtd++;
    const dk = dayKey(simDate());
    if(!state.trainedDays.includes(dk)){ state.trainedDays.push(dk); renderYou(); }
    /* v77: a standalone cardio session is a workout of its own on the calendar */
    pushHistory(simDate().toLocaleString('en-US',{month:'short', day:'numeric'}), {
      name: `${c.name} · ${simDate().toLocaleString('en-US',{weekday:'short'})}`,
      time: new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
      ex: [{ n: c.name, sets: [`✓ ${Math.floor(c.sec/60)} min${c.gps?` · ${c.dist.toFixed(2)} km`:''} · ~${Math.round(c.cal)} kcal`] }],
    });
  }
  renderFuel();

  /* post-lift cardio → ONE summary covering the lifting AND the cardio */
  if(c.segIdx!=null && state.exercises[c.segIdx]){
    const se = state.exercises[c.segIdx];
    se.done[0] = {w:0, r:0, hr:maxHr, cal:Math.round(c.cal)};
    se.completed = true;
    clearInterval(sessI); state.sess.run = false;
    state.workoutsWtd++; updateHud();
    recordSession();
    const lifts = state.exercises.filter(e=>!e.cardioSeg);
    const liftSec = state.sess.sec, liftMins = Math.floor(liftSec/60);
    const doneSets = lifts.reduce((a,e)=>a+e.done.filter(Boolean).length,0);
    const totSets = lifts.reduce((a,e)=>a+e.sets,0);
    const hrs = lifts.flatMap(e=>e.done.filter(Boolean).map(d=>d.hr||0)).filter(Boolean);
    const liftAvg = hrs.length? Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length) : 0;
    const liftCal = lifts.flatMap(e=>e.done.filter(Boolean).map(d=>d.cal||0)).reduce((a,b)=>a+b,0);
    const rows = state.exercises.filter(e=>!e.seg).map(e=>{
      const lastW = parseFloat(e.last);
      if(isNaN(lastW) || typeof e.target.w!=='number') return {n:e.n, delta:null};
      return {n:e.n, delta:Math.round((e.target.w - lastW)/lastW*100)};
    });
    const totalMin = Math.floor((liftSec + c.sec)/60);
    const allAvg = (liftAvg && avgHr) ? Math.round((liftAvg+avgHr)/2) : (liftAvg||avgHr);
    if(c.segSession) state.sessionName = c.segSession;
    $('#sum-title').textContent = `${state.sessionName} + Cardio`;
    $('#sum-stats').innerHTML = `
      <div class="b-stat"><div class="v">${totalMin}<span style="font-size:11px;color:var(--muted)"> min</span></div><div class="l">Total time</div></div>
      <div class="b-stat"><div class="v" style="color:#e66767">${allAvg||'—'}</div><div class="l">Avg ♥ bpm</div></div>
      <div class="b-stat"><div class="v" style="color:#eb6834">~${liftCal + Math.round(c.cal)}</div><div class="l">kcal est.</div></div>`;
    $('#sum-list').innerHTML =
      `<div class="sum-row" style="font-weight:700"><span>🏋️ Lifting — ${liftMins} min</span><span class="up">${doneSets} / ${totSets} sets</span></div>`
      + rows.map(r=>`<div class="sum-row"><span>${r.n}</span><span class="${r.delta===null?'na':r.delta>0?'up':r.delta<0?'dn':'na'}">${r.delta===null?'N/A — first time':(r.delta>0?'+':'')+r.delta+'% weight'}</span></div>`).join('')
      + `<div class="sum-row" style="font-weight:700"><span>🏃 ${CARDIO_TARGETS[c.type][0]} — ${mins}:${String(s).padStart(2,'0')}</span><span class="up">${c.gps? c.dist.toFixed(2)+' km' : (c.cfg.filter(cc=>cc.k!=='dur').map(cc=>`${cc.lab} ${c.vals[cc.k]}${cc.unit}`).join(' · ')||'timed')}</span></div>
         <div class="sum-row"><span>Cardio calories (est.)</span><span style="color:#eb6834;font-weight:700">🔥 ~${Math.round(c.cal)} kcal</span></div>
         ${maxHr?`<div class="sum-row"><span>Peak heart rate</span><span style="color:#e66767;font-weight:700">${maxHr} bpm</span></div>`:''}`;
    $('#sum-overlay').classList.add('on');
    addMsg(`Full session logged: <b>${state.sessionName}</b> (${liftMins} min · ${doneSets}/${totSets} sets) + <b>${CARDIO_TARGETS[c.type][0]}</b> (${mins} min ${s}s) — <b>~${liftCal + Math.round(c.cal)} kcal</b> total${maxHr?`, peak ♥ ${maxHr}`:''}. Summary is on screen; refuel window is open.`, 'bot');
    toast(`🏁 ${state.sessionName} + cardio complete`);
    state.cardio = null;
    renderTrain();
    return;
  }

  $('#sum-title').textContent = c.name;
  $('#sum-stats').innerHTML = `
    <div class="b-stat"><div class="v">${mins}:${String(s).padStart(2,'0')}</div><div class="l">Total time</div></div>
    <div class="b-stat"><div class="v" style="color:#e66767">${avgHr||'—'}</div><div class="l">Avg ♥ bpm</div></div>
    <div class="b-stat"><div class="v">${c.gps? c.dist.toFixed(2)+' km' : '—'}</div><div class="l">${c.gps?'Distance':'Machine'}</div></div>`;
  $('#sum-list').innerHTML =
    (c.gps? c.splits.map((sp,i)=>`<div class="sum-row"><span>Km ${i+1}</span><span class="up">${fmtPace(sp)}</span></div>`).join('') : '')
    + (c.gps? `<div class="sum-row"><span>Avg pace</span><span class="up">${fmtPace(c.sec/Math.max(c.dist,0.001))}/km</span></div>` : `<div class="sum-row"><span>Settings</span><span class="na">${cardioTargetStr(c.cfg, c.vals, c.mode)}</span></div>`)
    + `<div class="sum-row"><span>Calories burned (session est.)</span><span style="color:#eb6834;font-weight:700">🔥 ~${Math.round(c.cal)} kcal</span></div>
       ${maxHr?`<div class="sum-row"><span>Peak heart rate</span><span style="color:#e66767;font-weight:700">${maxHr} bpm</span></div>`:''}
       <div class="sum-row"><span>vs last ${c.name}</span><span class="na">N/A — first logged session</span></div>`;
  $('#sum-overlay').classList.add('on');

  addMsg(c.gps
    ? `${pick(flav().open)} <b>${c.name}</b> logged: <b>${c.dist.toFixed(2)} km</b> in ${mins}:${String(s).padStart(2,'0')} · avg <b>${fmtPace(c.sec/Math.max(c.dist,0.001))}/km</b> ${maxHr?` · peak ♥ ${maxHr}`:''}.\n${miniRoute(c.dist.toFixed(2))}\nRoute saved — pace trends live on the Progress tab.`
    : `${pick(flav().open)} <b>${c.name}</b> logged: ${mins} min ${s}s at ${cardioTargetStr(c.cfg, c.vals, c.mode)} ${maxHr?`· peak ♥ ${maxHr}. `:''}Counts toward your daily steps and deficit.`, 'bot');
  toast('🏃 Cardio logged');
  state.cardio = null;
  renderTrain();
}

/* ---------- post-lift cardio runs as a real live session: pause / end / adjust ---------- */
function segCardioType(n){
  const t = n.toLowerCase();
  if(t.includes('tread')) return 'tread';
  if(t.includes('stair')) return 'stair';
  if(t.includes('ellip')) return 'ellip';
  if(t.includes('swim')) return 'swim';
  if(t.includes('outdoor cycling')) return 'bikeout';
  if(t.includes('cycl') || t.includes('bike')) return 'bikein';
  if(t.includes('run')) return 'run';
  return 'tread';
}
function startSegCardio(i){
  const e = state.exercises[i];
  const type = segCardioType(e.n);
  const cfg = CARDIO_CFG[type].map(c=>({...c}));
  const vals = {};
  cfg.forEach(c=>{ vals[c.k] = (e.cardVals && e.cardVals[c.k]!==undefined) ? e.cardVals[c.k] : c.v; });
  vals.dur = e.cardDur || vals.dur || 30;
  if(vals.speed !== undefined && e.cardUnit==='kph') vals.speed = +(vals.speed/1.609).toFixed(1);
  vals.mode = e.cardMode === 'up' ? 'up' : 'down';
  const sessName = state.sessionName;
  cardioLive(type, e.n, cfg, vals);
  state.cardio.segIdx = i;
  state.cardio.segSession = sessName;
}

function isQuestion(raw){
  const t = raw.trim().toLowerCase();
  if(/\b(swap|replace|substitute|log it|log this|track|remind me)\b/.test(t)) return false;
  return /\?\s*$/.test(t)
    || /^(what|whats|how|why|which|when|where|who|should|could|would|can|is|are|do|does|explain|tell me about|compare)\b/.test(t)
    || /(pros and cons|pro and con|difference between|benefits? of|better for|what'?s the)/.test(t);
}

function answerQuestion(t){
  const named = Number(/ppl|push.?pull/.test(t)) + Number(/bro/.test(t)) + Number(/full.?body|full body/.test(t));
  if(named >= 2 || /(each|all|every|which|best|compare).{0,20}split|split.{0,25}(pros|cons|better|best|compare|difference)/.test(t)){
    return `Great question — here's the honest breakdown:\n\n${SPLIT_INFO.ppl}\n\n${SPLIT_INFO.bro}\n\n${SPLIT_INFO.full}\n\n🧠 My take for <b>you</b>: with your goals and most days free to train, <b>PPL</b> gives the best frequency-to-recovery balance. Full body is the smart fallback on a 3-day week.`;
  }
  if(/ppl|push.?pull/.test(t)) return SPLIT_INFO.ppl;
  if(/bro.?split|bro split/.test(t)) return SPLIT_INFO.bro;
  if(/full.?body/.test(t)) return SPLIT_INFO.full;

  const EXQ = [
    [/incline/, `<b>Incline press</b> hits the upper chest (clavicular pec) plus front delts and triceps. The ~30° angle biases fibers a flat bench under-loads — that's why it anchors your Push days.`],
    [/flat bench|bench press|db bench|dumbbell bench/, `<b>Bench press</b> is the main horizontal push: mid/lower chest (sternal pec), front delts, and triceps. Dumbbells add range of motion and let each shoulder find its own path.`],
    [/squat/, `<b>Squats</b> are the king of lower-body lifts: quads and glutes do the heavy lifting, adductors and hamstrings assist, and your core and upper back brace the load.`],
    [/romanian|rdl|deadlift/, `<b>Deadlifts / RDLs</b> train the hinge: hamstrings, glutes, spinal erectors, and grip. The Romanian version keeps constant tension on the hamstrings with less lower-back fatigue.`],
    [/pull.?up|pulldown/, `<b>Pull-ups / pulldowns</b> are vertical pulls: lats first, plus biceps and mid-back. This is the movement that builds back <i>width</i>.`],
    [/\brows?\b/, `<b>Rows</b> are horizontal pulls: lats, rhomboids, and traps for back <i>thickness</i>, with rear delts and biceps assisting.`],
    [/lateral raise/, `<b>Lateral raises</b> isolate the side delts — the muscle that makes shoulders look wide. Light weight, strict form, high reps.`],
    [/face pull/, `<b>Face pulls</b> hit rear delts and the rotator cuff. Not a glamour lift — but they're shoulder insurance.`],
    [/\bdips?\b/, `<b>Dips</b> load the lower chest and triceps hard. Lean forward for more chest, stay upright for more triceps.`],
    [/\bfly|pec.?deck/, `<b>Flys</b> isolate the pecs through adduction with a big stretch under load — a potent growth signal. No triceps involvement, pure chest.`],
    [/hammer curl|curl/, `<b>Curls</b> isolate the biceps; hammer-grip versions add the brachialis and forearms. Quality reps beat heavy sloppy ones.`],
    [/skull|triceps ext|overhead.*triceps/, `<b>Overhead triceps extensions</b> bias the long head — the biggest of the three — because it stretches fully overhead.`],
    [/leg press/, `<b>Leg press</b> hits quads and glutes with almost no spinal demand — great for pushing legs hard when your lower back is taxed.`],
    [/leg curl/, `<b>Leg curls</b> isolate the hamstrings through knee flexion — the half of hamstring training RDLs miss.`],
    [/calf/, `<b>Calf raises</b> train the gastrocnemius (standing) and soleus (seated). High reps, full stretch, pause at the top.`],
  ];
  for(const [rx, ans] of EXQ) if(rx.test(t)) return ans;

  if(/glute|booty|butt/.test(t))
    return `<b>Best glute training</b>, ranked:\n\n1. <b>Hip thrusts</b> — highest direct glute tension; already in your leg days\n2. <b>Romanian deadlifts</b> — loaded stretch, glutes + hamstrings together\n3. <b>Deep squats</b> — below parallel is where glutes take over from quads\n4. <b>Walking lunges / split squats</b> — brutal but effective finisher\n\nThe pattern that matters: hinge + thrust + deep knee bend, 2×/week, progressive load.`;
  if(/\babs\b|core|six.?pack/.test(t))
    return `<b>Abs</b> come from two things: training the muscle and being lean enough to see it.\n\n• <b>Hanging leg raises</b> — lower abs, big range\n• <b>Cable crunches</b> — loaded, progressive\n• <b>Ab wheel / plank series</b> — anti-extension strength\n\nHonest answer: your calorie deficit is doing more for visible abs than any exercise. Train them 2–3×/week, let the cut do the reveal.`;
  if(/(bigger|best).{0,20}(arm|bicep|tricep)|arm day/.test(t))
    return `<b>Arms</b>: triceps are ⅔ of arm size, so prioritize them.\n\n• <b>Triceps</b> — overhead extensions (long-head stretch) + pushdowns + dips\n• <b>Biceps</b> — incline curls (stretch) + preacher curls (strict)\n\nYou're already hitting each 2×/week — arm growth on your program is a patience game.`;

  if(/(jeff nippard|dr\.?\s?mike|israetel|renaissance periodization|\brp\b|source|where.{0,15}(info|data)|research|stud(y|ies)|science|evidence|peer.?review)/.test(t))
    return `Everything I program is anchored to peer-reviewed exercise and nutrition science:\n\n• <b>Volume</b>: ~10–20 hard sets/muscle/week (dose-response meta-analyses, Schoenfeld et al.)\n• <b>Protein</b>: 1.6–2.2 g/kg/day (Morton et al. 2018, BJSM meta-analysis — your ${state.macros.protein.t} g target sits here)\n• <b>Rep targets</b>: anywhere from 5–30 reps grows muscle similarly when sets approach failure (Schoenfeld et al. 2021)\n• <b>Long-muscle-length work</b>: lengthened-position training matches or beats full ROM in recent trials and 2024–25 meta-analyses (Maeo et al.; Wolf et al. 2025) — why your plan favors incline curls, overhead extensions, and seated leg curls\n• <b>Rest</b>: ≥2 min on compounds beats short rest (Grgic et al. 2018)\n\n<i>In the full product every recommendation links to its DOI so you can read the source yourself.</i>`;
  if(/(training rules|my rules|progression rule|when.{0,15}(increase|add) weight|how long.{0,15}rest|rest between)/.test(t))
    return `Your training rules, as I have them:\n\n• <b>Compounds</b> — 4 × 8–10, rest 2–3 min\n• <b>Isolation</b> — 4 × 10–12, rest 60–90 s\n• <b>Progression</b> — add weight only when <i>every</i> set reaches the top of the rep range with good form\n• <b>Tempo</b> — 2–3 s controlled eccentrics\n• <b>Cardio</b> — incline treadmill after every lift: incline 6+, 3.0–3.5 mph, 30 min\n• <b>Deload</b> — only if performance and recovery noticeably decline\n\nI enforce these automatically — rest timers, targets, and weight jumps all follow them.`;
  if(/(how many|how much).{0,15}steps|step goal|daily activity/.test(t))
    return `Your daily activity goal is <b>10,000–12,000 steps</b>, plus the 30-min incline walk after every lift. On Sundays the walk <i>is</i> the workout: 8–12K steps easy.`;
  if(/progressive overload/.test(t))
    return `<b>Progressive overload</b> means the challenge has to keep rising for the muscle to keep adapting — a bit more weight, an extra rep, a cleaner range of motion. It's why I track every set.`;
  if(/hypertrophy|muscle grow|build muscle|gain muscle|get bigger|how.*muscle.*(grow|built)/.test(t))
    return `<b>Hypertrophy</b> in one breath: muscles grow when you give them a reason and the resources.\n\n• <b>The reason</b> — mechanical tension: sets taken close to failure, ~5 to 30 reps, about 10–20 hard sets per muscle per week, each muscle ~2×/week.\n• <b>The resources</b> — enough protein (~1g/lb for you), enough calories, and sleep.\n• <b>The multiplier</b> — progressive overload: gradually adding weight or reps so the stimulus keeps rising.`;
  if(/fat loss|lose fat|cutting|lose weight|burn fat|get lean/.test(t))
    return `<b>Fat loss</b> comes down to one law with three levers:\n\n• <b>The law</b> — a calorie deficit; ~300–500 kcal under maintenance is sustainable.\n• <b>Lever 1: protein</b> — keep it high (~1g/lb) so the weight you lose is fat, not muscle.\n• <b>Lever 2: lifting</b> — keep training heavy; it's the signal that the muscle stays.\n• <b>Lever 3: movement</b> — steps and Zone 2 quietly widen the deficit.\n\nRealistic pace: 0.5–1% of bodyweight per week.`;
  if(/(what|why|benefit).{0,30}(weightlift|lifting weights|resistance training|strength training)|weightlifting.*(what|is|benefit)/.test(t))
    return `<b>Weightlifting / resistance training</b> is loading your muscles against external resistance so they adapt by getting stronger and bigger. Payoffs: muscle and strength, denser bones, better insulin sensitivity, higher resting metabolism, injury resistance, and one of the best-evidenced longevity habits we know of.`;
  if(/zone 2|zone two/.test(t))
    return `<b>Zone 2</b> is easy aerobic work — a pace where you could hold a conversation (roughly 60–70% of max HR). It builds your aerobic base, improves recovery between lifting sessions, and barely adds fatigue.`;
  if(/yoga.*(what|benefit|good|why)|(what|benefit|why).*yoga/.test(t))
    return `<b>Yoga</b> for a lifter is mobility + recovery + nervous-system downshift: better hip and thoracic range, active recovery, and breathwork that shows up in your HRV.`;
  if(/pilates.*(what|benefit|good|why)|(what|benefit|why).*pilates/.test(t))
    return `<b>Pilates</b> is control-focused core and postural training — deep core, glutes, and the stabilizers big lifts rely on.`;
  if(/(how much|how many).{0,20}protein|protein.{0,15}(need|day|enough)/.test(t))
    return `Aim for <b>~0.7–1g of protein per pound of bodyweight per day</b> — I've set you at ${state.macros.protein.t}g. Spread it across 3–5 meals of 30–50g each.`;
  if(/(push|pull|leg) day.*(what|mean|muscle)|what.{0,10}(push|pull|leg) day/.test(t))
    return `<b>Push day</b> = chest, shoulders, triceps. <b>Pull day</b> = back, biceps, rear delts. <b>Leg day</b> = quads, hamstrings, glutes, calves. Grouping by pattern builds recovery into the structure.`;
  return null;
}

function applyTheme(raw){

/* v109/v110: the five personas (community placeholder) — gender follows the coach setting.
   One does pull-ups in the middle while the other four watch. The puller cycles through
   a shuffled order: never the same twice in a row, no repeats until all five have gone.
   The four watchers reshuffle every time too, never landing in the same arrangement twice. */
const LINEUP_ALL = ['encouraging','scientific','tough','military','bodybuilder'];
function shuffleArr(a){ const x=[...a]; for(let j=x.length-1;j>0;j--){ const k=Math.floor(Math.random()*(j+1)); [x[j],x[k]]=[x[k],x[j]]; } return x; }
/* v111: the lineup deals a new puller only when you come BACK to the Progress tab —
   re-renders while you're on the tab keep the current arrangement */
function advanceLineup(){
  const L = state.lineup = state.lineup || {order:[], i:0, prev:null, prevWatch:'', seq:null};
  if(!Array.isArray(L.order) || L.i >= L.order.length){
    let pool;
    do { pool = shuffleArr(LINEUP_ALL); } while(pool[0] === L.prev);   /* new cycle can't open with last cycle's closer */
    L.order = pool; L.i = 0;
  }
  const puller = L.order[L.i++];
  L.prev = puller;
  let rest;
  do { rest = shuffleArr(LINEUP_ALL.filter(x=>x!==puller)); } while(rest.join() === L.prevWatch);
  L.prevWatch = rest.join();
  L.seq = [rest[0], rest[1], puller, rest[2], rest[3]];
}
function personaLineup(px=56){
  if(!state.lineup || !Array.isArray(state.lineup.seq) || state.lineup.seq.length !== 5) advanceLineup();
  const puller = state.lineup.prev;

  const keepP = state.personality, keepSpr = {...state.spr};
  const sex = state.spr.sex;
  const html = seq.map(pk=>{
    state.personality = pk;

}

function computeScene(){
  if(sceneLock) return sceneLock;
  if(state.resting || (state.cardio && state.cardio.on && state.cardio.paused) || (state.sess.run && state.sess.paused)) return 'recover';
  if(state.cardio && state.cardio.on){
    return ({run:'run',tread:'run',stair:'stair',ellip:'ellip',bikein:'bike',bikeout:'bike',swim:'swim'})[state.cardio.type] || 'run';
  }
  const tab = state.tab || 'coach';
  if(tab==='train'){
    if(state.activeSet && state.exercises[state.activeSet.i]){
      const e = state.exercises[state.activeSet.i];
      if(e.cardioSeg) return 'run';
      const mg = NAME2MG[e.n] || '';
      return MG2SCENE[mg] || 'lift';
    }
    return 'jumprope';
  }
  if(tab==='you') return 'wave';
  return ({coach:'chalk', fuel:'cook', progress:'grow'})[tab] || 'lift';
}

function parseFoods(text){
  /* v50: phrase-aware — "mac and cheese", "big mac", "ribeye steak" match before single words */
  const words = text.toLowerCase().replace(/['\u2019]/g,'').replace(/[.,!?]/g,' ').split(/\s+/).filter(Boolean);
  const found = [];
  let i = 0;
  while(i < words.length){
    let hit = null, len = 1;
    for(let L = Math.min(3, words.length - i); L >= 1; L--){
      const phrase = words.slice(i, i+L).join(' ');
      if(FOODS[phrase]){ hit = phrase; len = L; break; }
    }
    if(!hit){ /* plural fallback: "pancakes" → pancake, "lattes" → latte */
      const w = words[i];
      const sg = w.endsWith('s') ? w.slice(0,-1) : null;
      if(sg && FOODS[sg]){ hit = sg; len = 1; }
    }
    if(hit){
      let qty = 1;
      for(let j=Math.max(0,i-3); j<i; j++){
        const cand = words[j];
        if(FOODS[cand]){ qty = 1; continue; }
        if(NUMWORDS[cand]!==undefined) qty = NUMWORDS[cand];
        else if(/^\d+(\.\d+)?$/.test(cand)) qty = parseFloat(cand);
      }
      if(hit==='shake' && found.length && found[found.length-1].key==='protein') found.pop();
      found.push({key:hit, qty, ...FOODS[hit]});
      i += len;
    } else i++;
  }
  return found;
}

function logMeal(foods, raw){
  const tot = foods.reduce((a,f)=>({cal:a.cal+f.cal*f.qty, p:a.p+f.p*f.qty, c:a.c+f.c*f.qty, f:a.f+f.f*f.qty}),{cal:0,p:0,c:0,f:0});
  tot.cal=Math.round(tot.cal); tot.p=Math.round(tot.p); tot.c=Math.round(tot.c); tot.f=Math.round(tot.f);
  state.macros.cal.v += tot.cal; state.macros.protein.v += tot.p;
  state.macros.carbs.v += tot.c; state.macros.fat.v += tot.f;
  const desc = foods.map(f=>`${f.qty!==1?f.qty+' ':''}${f.key}`).join(', ');
  state.meals.push({n:'Meal', s:desc, cal:tot.cal, p:tot.p, c:tot.c, f:tot.f,
    items: foods.map(f=>({n:`${f.qty!==1?f.qty+' ':''}${f.key}`, cal:Math.round(f.cal*f.qty), p:Math.round(f.p*f.qty)}))});
  state.mealIdx = state.meals.length-1;
  state.mealCount = (state.mealCount||0) + 1;
  checkMedals();
  renderFuel();
  transientScene('eat');
  return tot;
}

/* v59: vitamins & minerals estimated ONLY from logged meals */
function microEst(){
  /* v98: meals analyzed by the LLM carry real micro estimates — use them when present */
  const api = {};
  let apiAny = false;
  state.meals.forEach(ml=>{ if(ml.micros){ apiAny = true; for(const [k,v] of Object.entries(ml.micros)) api[k] = (api[k]||0) + v; } });
  if(apiAny){
    return ['Vitamin D','Vitamin B12','Vitamin C','Iron','Calcium','Magnesium','Potassium','Zinc','Fiber','Sodium'].map(n=>{
      const v = Math.min(250, Math.round(api[n]||0));
      return {n, v, warn: n==='Sodium' && v > 100};
    });
  }
  const m = state.macros;
  const calP = Math.min(1, m.cal.v / Math.max(1, m.cal.t));
  const pP = Math.min(1, m.protein.v / Math.max(1, m.protein.t));
  const cP = Math.min(1, m.carbs.v / Math.max(1, m.carbs.t));
  const fP = Math.min(1, m.fat.v / Math.max(1, m.fat.t));
  const sodium = Math.round(calP*115);
  return [
    {n:'Vitamin D', v: Math.round((pP*0.7 + fP*0.3)*70)},
    {n:'Vitamin B12', v: Math.round(pP*95)},
    {n:'Vitamin C', v: Math.round(cP*80)},
    {n:'Iron', v: Math.round((pP*0.6 + cP*0.4)*65)},
    {n:'Calcium', v: Math.round((pP*0.5 + fP*0.5)*75)},
    {n:'Magnesium', v: Math.round(cP*70)},
    {n:'Potassium', v: Math.round(cP*75)},
    {n:'Zinc', v: Math.round(pP*85)},
    {n:'Fiber', v: Math.round(cP*80)},
    {n:'Sodium', v: sodium, warn: sodium > 100},
  ];
}

function proteinLeft(){ return Math.max(0, state.macros.protein.t - state.macros.protein.v); }
function calLeft(){ return Math.max(0, state.macros.cal.t - state.macros.cal.v); }

/* ---------- v52: evidence-based calorie targets ----------
   Mifflin-St Jeor BMR from weight/height/age/sex, scaled by real
   training frequency, then a goal offset. Replaces the old
   bodyweight×15 rule that badly overshot for heavier users. */
function heightCm(){
  const h = String(state.user.height||'').trim();
  let m;
  if((m = h.match(/(\d{2,3}(?:\.\d+)?)\s*cm/i))) return +m[1];
  if((m = h.match(/(\d)\s*['\u2019]\s*(\d{1,2})?/))) return Math.round((+m[1]*12 + (+m[2]||0)) * 2.54);
  if((m = h.match(/^(\d{2,3})$/)) && +m[1] >= 130) return +m[1];
  return /female/i.test(state.user.gender||'') ? 163 : 178;   // median fallback when height unknown
}
function tdee(){
  const wKg = (state.user.weight || 180) * LB2KG;
  const age = state.user.age || 30;
  const fem = /female/i.test(state.user.gender||'');
  const bmr = 10*wKg + 6.25*heightCm() - 5*age + (fem ? -161 : 5);
  const days = state.workoutsGoal || ({Intense:6, Moderate:5, Beginner:3})[state.intensity] || 4;
  const act = days >= 6 ? 1.525 : days === 5 ? 1.475 : days === 4 ? 1.425 : 1.375;
  return Math.round(bmr * act);
}
function calTarget(goal){
  const t = tdee();
  const floor = /female/i.test(state.user.gender||'') ? 1200 : 1500;
  if(state.rateAdj) return Math.max(floor, t + state.rateAdj);          // user asked for a specific lb/week rate
  if(/fat ?loss/i.test(goal||'')) return Math.max(floor, t - 500);      // ~1 lb/week
  if(/muscle ?gain/i.test(goal||'')) return t + 300;                    // lean surplus
  return t;                                                             // recomp / maintenance
}
/* one call re-tunes everything: calories, protein (1g/lb), fat (~27% kcal), carbs (remainder) */
function retuneMacros(){
  if(!state.goalsKnown) return;
  const w = state.user.weight || 180;
  state.macros.cal.t = calTarget(state.goal);
  state.burnGoal = /fat ?loss/i.test(state.goal||'') ? 500 : /muscle ?gain/i.test(state.goal||'') ? 300 : 400;
  state.macros.protein.t = Math.round(w);
  state.macros.fat.t = Math.round(state.macros.cal.t * 0.27 / 9);
  state.macros.carbs.t = Math.max(0, Math.round((state.macros.cal.t - state.macros.protein.t*4 - state.macros.fat.t*9)/4));
}

    : `Sleep, recovery and HRV read <b>N/A</b> — connect a wearable (Whoop, Apple Watch, Garmin, Oura) and I'll start adapting training to your recovery.`;
  const weigh = (state.weighDays.includes(TODAY_NAME) && !state.weighedToday) ? ` It's also <b>weigh-in day</b> — hit the scale when you're ready.` : '';
  const adapt = !state.hasWearable ? '' :

    (r.sleepH && r.sleepH < 7) ? ` You were under 7 hours, so one set comes off each compound today — and tonight's bedtime target is <b>10:30 PM</b>.` : '';
  const fuel = state.goalsKnown

    : ` Calorie and protein targets read <b>N/A</b> — I don't know your journey yet, so I can't tell whether you should be eating more or less at your height and weight. Let's fix that right now.`;
  return `${vitals}${adapt}${sched}${fuel}${weigh}`;

function coachReply(text){

  if(pendingIntent==='fooddesc'){
