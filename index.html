    const tot = logMeal(foods, text);
    const left = proteinLeft();
    const lines = foods.map(fd=>`• <b>${fd.qty!==1?fd.qty+' ':''}${fd.key}</b> — ${Math.round(fd.cal*fd.qty)} kcal · ${Math.round(fd.p*fd.qty)}g P · ${Math.round(fd.c*fd.qty)}g C · ${Math.round(fd.f*fd.qty)}g F`).join('\n');
    const follow = left>0 ? `You're at <b>${state.macros.protein.v}g protein</b> — ${left}g to go.` : `Protein goal ✅.`;
    return { text:`${pick(f.open)} Looked it up — per-item nutrition from my built-in database:\n\n${lines}\n\n<b>Meal total: ~${tot.cal} kcal · ${tot.p}g protein · ${tot.c}g carbs · ${tot.f}g fat</b> — logged as Meal ${state.meals.length}.\n\n${follow}` };
  }

  /* ----- weigh-in day ----- */
  if(pendingIntent==='weighin'){
    let w = parseFloat(text);
    if(!isNaN(w) && (/kg/i.test(text) || (state.units==='kg' && !/lb/i.test(text)))) w = Math.round(w/LB2KG);
    if(isNaN(w) || w <= 0) return { text:`Just the number — e.g. "185.4".` };
    const delta = (w - state.weightNow).toFixed(1);
    state.user.weight = w; state.weightNow = w;
    state.weighedToday = true;
    if(state.profileSet) state.profileSet.weight = true;
    retuneMacros();
    checkMedals();
    state.memory.unshift({ic:'⚖️', t:`Weigh-in (${TODAY_NAME}): ${w} lb (${delta>0?'+':''}${delta})`});
    renderYou(); renderFuel(); renderProgress();
    pendingIntent = null;
    const trend = delta <= 0 ? `right on track for your cut — the deficit is doing its job` : `slightly up — could be water, sodium, or carbs from yesterday; the weekly trend is what matters`;
    return { text:`Logged: <b>${w} lb</b> (${delta>0?'+':''}${delta} lb since last weigh-in). You're ${trend}. Next weigh-in: ${state.weighDays.filter(d=>d!==TODAY_NAME)[0]||TODAY_NAME}.` };
  }

  /* ----- edit profile / names ----- */
  if(/edit (my )?(profile|info|name)|change (my|the|coach'?s?) name|redo (my )?(setup|profile)|go back to (the )?setup/.test(t)){
    setTimeout(()=>showObForm(true), 400);
    return { text:`Sure — here's your profile card. Change anything and hit save.` };
  }

  /* ----- questions get ANSWERED first — never consumed by a flow step ----- */
  if(isQuestion(text)){
    const ans = answerQuestion(t);
    if(ans){
      const back = {
        activity:`\n\n—\nSo, back to it: what are we doing today — <b>lift</b>, <b>run</b>, <b>yoga</b>, or <b>pilates</b>?`,
        split:`\n\n—\nNow that you've got the trade-offs: <b>PPL</b>, <b>bro split</b>, or <b>full body</b>?`,
        confirm:`\n\n—\nAnd for today — run the scheduled session? (yes / no)`,
        chooseDay:`\n\n—\nWhich day do you want: <b>Push</b>, <b>Pull</b>, or <b>Legs</b>?`,
        runType:`\n\n—\nSo which run — <b>Zone 2</b>, <b>intervals</b>, or <b>tempo</b>?`,
        yogaType:`\n\n—\n<b>Vinyasa flow</b> or <b>deep stretch</b>?`,
        pilatesType:`\n\n—\n<b>Core focus</b> or <b>full body</b>?`,
      }[pendingIntent] || '';
      return { info:true, text: ans + back };
    }
  }

  /* go back — return to the daily options */
  if(/^(go back|back|previous|undo)\b/.test(t)){
    return { text:`No problem — here are your options:`, flow:'root' };
  }

  /* generated coach-tab background */
  if(/(background|theme|wallpaper|skin)/.test(t) && /(change|set|make|switch|generate|new|give)/.test(t)){
    let subject = (text.match(/(?:to|of|like)\s+(?:a\s+|an\s+|the\s+)?(.+)$/i)||[])[1] || text.replace(/change|set|make|switch|generate|give|my|the|background|theme|wallpaper|skin|new|to|me|a\b/gi,'').trim() || 'aurora';
    const label = applyTheme(subject);
    return { text:`Done — I generated a "<b>${label}</b>" backdrop for our chat. ✨ Describe any vibe — "miami sunset", "deep forest", "midnight" — and I'll re-skin this space to match.` };
  }

  /* rename the coach */
  if(/(call you|your name (is|to)|rename you|name you)/.test(t)){
    const nm = (text.match(/(?:call you|name you|your name (?:is|to))\s+([a-z0-9 ]{2,20})/i)||[])[1];
    if(nm){ state.coachName = nm.trim().replace(/\b\w/g,c=>c.toUpperCase()); updateHeader(); renderFuel(); renderYou();
      return { text:`<b>${state.coachName}</b> — has a ring to it. That's me from now on. 🤝` }; }
  }

  /* morning briefing preview */
  if(/briefing/.test(t)){
    return { text:`Pulling up this morning's briefing:`, brief:true };
  }

  /* ----- daily flow (typed fallbacks) ----- */
  if(pendingIntent==='activity'){
    if(/(lift|weight|strength|gym|iron)/.test(t)){ pendingIntent = 'split';
      return { text:`${pick(f.open)} Iron it is. What kind of split do you feel like — <b>PPL</b>, <b>bro split</b>, or <b>full body</b>?` }; }
    if(/(run|jog|cardio)/.test(t)){ pendingIntent = 'runType';
      return { text:`${pick(f.open)} An easy <b>Zone 2</b> run, <b>intervals</b>, or a <b>tempo</b> run. Which one?` }; }
    if(/yoga/.test(t)){ pendingIntent = 'yogaType';
      return { text:`${pick(f.open)} <b>Vinyasa flow</b> (30 min) or a <b>deep stretch</b> session (25 min)?` }; }
    if(/pilates/.test(t)){ pendingIntent = 'pilatesType';
      return { text:`${pick(f.open)} <b>Core focus</b> (30 min) or <b>full body</b> (35 min)?` }; }
    if(/(rest|off|nothing|day off|recover)/.test(t)){
      pendingIntent = null;
      applyPreset('recoveryDay');
      return { text:`${pick(f.open)} Recovery day it is — I've loaded your Sunday protocol on the Train tab: walk 8–12K steps, 15–20 min of stretching, foam roll, meal prep, early lights-out.`, goTab:'train' };
    }
    if(/(train|workout|exercise|move)/.test(t)){
      return { text:`${pick(f.open)} Let's pick a lane — <b>lift weights</b>, <b>run</b>, <b>yoga</b>, or <b>pilates</b>?` };
    }
  }
  if(pendingIntent==='split'){
    if(isQuestion(text)){
      return { text: answerQuestion('compare each split — ppl, bro split, full body') + `\n\n—\nSo — <b>PPL</b>, <b>bro split</b>, or <b>full body</b>?` };
    }
    if(/ppl|push.?pull/.test(t)){
      pendingIntent = 'confirm'; pendingPreset = SCHED_KEY;
      return { text: Object.keys(state.history).length
        ? `PPL it is. Today is ${TODAY_NAME}, which puts <b>${PRESETS[SCHED_KEY].name}</b> on the rotation — targets come straight from your own logged numbers. Continue?`
        : `PPL it is. Today is ${TODAY_NAME}, which puts <b>${PRESETS[SCHED_KEY].name}</b> first on the rotation — your opening session sets every baseline. Load it?` };
    }
    if(/bro|chest/.test(t)){
      pendingIntent = 'confirm'; pendingPreset = 'chest';
      return { text:`Switching to the bro split — today lands on <b>Chest Day</b>: barbell bench, incline press, dips, flys. Run it?` };
    }
    if(/full/.test(t)){
      pendingIntent = 'confirm'; pendingPreset = 'fullA';
      return { text:`<b>Full Body A</b> — squat, bench, row, RDL, core. One tight session. Run it?` };
    }
  }
  if(pendingIntent==='confirm'){
    if(/(yes|yeah|yep|sure|continue|let'?s|do it|run it|load it|lock)/.test(t)){
      pendingIntent = null;
      const key = pendingPreset; pendingPreset = null;
      applyPreset(key);
      state.splitChosen = true;
      return { text:`${pick(f.open)} <b>${state.sessionName}</b> is loaded on your Train tab — targets already set from your history. ${f.push}`, goTab:'train' };
    }
    if(/(no|nah|different|something else|change)/.test(t)){
      pendingIntent = 'chooseDay'; pendingPreset = null;
      return { text:`No problem — which day do you want instead: <b>Push</b>, <b>Pull</b>, or <b>Legs</b>? Or name a different activity entirely.` };
    }
  }
  if(pendingIntent==='chooseDay'){
    const dayKey = /pull.?b/.test(t)?'pullB':/pull/.test(t)?'pullA':/leg.?b/.test(t)?'legsB':/leg/.test(t)?'legsA':/push.?b/.test(t)?'pushB':/push/.test(t)?'pushA':null;
    if(dayKey){
      pendingIntent = null;
      applyPreset(dayKey);
      return { text:`${pick(f.open)} <b>${state.sessionName}</b> loaded — I've reshuffled the rest of your week so nothing gets skipped.`, goTab:'train' };
    }
  }
  if(pendingIntent==='runType'){
    const k = /interval/.test(t)?'runInt':/tempo/.test(t)?'runTempo':/(zone|easy|2)/.test(t)?'runZ2':null;
    if(k){ pendingIntent = null; applyPreset(k);
      return { text:`${pick(f.open)} <b>${state.sessionName}</b> is on your Train tab — check off each segment as you go.`, goTab:'train' }; }
  }
  if(pendingIntent==='yogaType'){
    const k = /(stretch|deep)/.test(t)?'yogaStretch':/(vinyasa|flow)/.test(t)?'yogaFlow':null;
    if(k){ pendingIntent = null; applyPreset(k);
      return { text:`${pick(f.open)} <b>${state.sessionName}</b> loaded. Move slow, breathe slower. 🧘`, goTab:'train' }; }
  }
  if(pendingIntent==='pilatesType'){
    const k = /core/.test(t)?'pilCore':/full/.test(t)?'pilFull':null;
    if(k){ pendingIntent = null; applyPreset(k);
      return { text:`${pick(f.open)} <b>${state.sessionName}</b> loaded on your Train tab. Control over speed on every rep.`, goTab:'train' }; }
  }

  /* set corrections in plain English */
  const findExInText = () => {
    const idx = state.exercises.findIndex(e=>!e.seg && e.n.toLowerCase().split(/[\s-]+/).some(wd=>wd.length>3 && t.includes(wd)));
    return idx >= 0 ? idx : (state.lastLogged ? state.lastLogged.i : -1);
  };
  const only = t.match(/only (?:got|did|managed|hit) (\d+)|(?:missed|failed).{0,20}(?:got|at) (\d+)/);
  if(only && state.planReady){
    const i = findExInText();
    const e = state.exercises[i];
    if(e && e.done.length){
      const s = (state.lastLogged && state.lastLogged.i===i) ? state.lastLogged.s : e.done.length-1;
      e.done[s].r = +(only[1]||only[2]);
      renderTrain();
      reactToSet(e, e.done[s].w, e.done[s].r);
      return { text:`Corrected — <b>${e.n}</b> set ${s+1} is now ${e.done[s].w}${typeof e.done[s].w==='number'?' lb':''} × ${e.done[s].r}. Already factored into today's plan and next session's targets.` };
    }
  }
  const extra = t.match(/(?:got|did|added) (\d+) (?:more|extra)|(\d+) extra reps/);
  if(extra && state.planReady){
    const i = findExInText();
    const e = state.exercises[i];
    if(e && e.done.length){
      const s = (state.lastLogged && state.lastLogged.i===i) ? state.lastLogged.s : e.done.length-1;
      e.done[s].r += +(extra[1]||extra[2]);
      renderTrain();
      reactToSet(e, e.done[s].w, e.done[s].r);
      return { text:`Nice — <b>${e.n}</b> set ${s+1} updated to ${e.done[s].w}${typeof e.done[s].w==='number'?' lb':''} × ${e.done[s].r}.` };
    }
  }

  /* "this exercise is impossible" → auto-substitute */
  if(/(can'?t|cannot|impossible|unavailable|broken|taken|no machine|skip the)/.test(t) && state.planReady){
    const hit = state.exercises.find(e=>!e.seg && e.n.toLowerCase().split(/[\s-]+/).some(wd=>wd.length>3 && t.includes(wd.toLowerCase())));
    if(hit){
      const old = hit.n;
      hit.n = hit.alt; hit.alt = old; hit.note = `Swapped in — ${hit.why}`;
      renderTrain();
      return { text:`${pick(f.open)} Done — <b>${old}</b> is out, <b>${hit.n}</b> is in (${hit.why}). Same stimulus, progression stays on track. The Train tab already reflects it.` };
    }
  }

  /* "log food / log a meal" → the three-tier picker */
  if(/log.{0,12}(food|meal)|scan.{0,10}barcode|barcode/.test(t)){
    setTimeout(showFoodOptions, 400);
    return { silent:true };
  }

  /* rate-based goal: "lose 2 lb per week" / "gain 0.5 kg a week" → calories adjust */
  const rateM = t.match(/\b(lose|drop|cut|gain|add|put on)\s+(\d+(?:\.\d+)?)\s*(lbs?|pounds?|kgs?|kilos?)\s*(?:a|per|\/|each|every)?\s*(week|wk)/);
  if(rateM){
    const dir = /gain|add|put on/.test(rateM[1]) ? 1 : -1;
    let lbWk = parseFloat(rateM[2]) * (/kg|kilo/.test(rateM[3]) ? 2.2046 : 1);
    const capped = lbWk > 2;
    if(capped) lbWk = 2;
    const daily = Math.round(lbWk * 3500 / 7);
    const w = state.user.weight || 180;
    const oldT = state.macros.cal.t || tdee();
    state.goal = dir < 0 ? 'Fat loss' : 'Muscle gain';
    state.goalsKnown = true;
    state.rateAdj = dir*daily;
    retuneMacros();
    state.macros.protein.t = Math.round(Math.max(state.macros.protein.t||0, w));
    const rateStr = `${(Math.round(lbWk*10)/10)} lb/week` + (state.units==='kg' ? ` (~${(lbWk*0.4536).toFixed(1)} kg)` : '');
    state.memory.unshift({ic:'🎯', t:`Target rate: ${dir<0?'lose':'gain'} ${rateStr} — calories set to ${state.macros.cal.t.toLocaleString()}/day`});
    renderFuel(); renderYou(); updateHud();
    return { text:`${pick(f.open)} Done — the math: ${dir<0?'losing':'gaining'} <b>${rateStr}</b> means a <b>~${daily.toLocaleString()} kcal daily ${dir<0?'deficit':'surplus'}</b>.\n\n🍽 New calorie target: <b>${state.macros.cal.t.toLocaleString()} kcal/day</b> (was ${oldT.toLocaleString()})\n🍗 Protein stays high at <b>${state.macros.protein.t}g/day</b> to ${dir<0?'protect muscle in the deficit':'fuel the build'}.${capped ? `\n\n⚠️ You asked for more than 2 lb/week — peer-reviewed guidance tops out around 1–2 lb/week for sustainable ${dir<0?'fat loss that spares muscle':'gain that isn\'t mostly fat'}, so I've set the maximum I'll coach you to.` : ''}\n\nEvery number re-tunes as your weigh-ins come in.` };
  }

  /* food logging */
  if(/\b(ate|had|eating|eat)\b|for (breakfast|lunch|dinner)|i'?m having/.test(t)){
    /* v99: Claude reads the meal first — the built-in dictionary is only the backup */
    if(state.apiKey){ llmFoodText(text); return {silent:true, noAuto:true}; }
    const foods = parseFoods(t);
    if(foods.length){
      const tot = logMeal(foods, text);
      const left = proteinLeft();
      const lines = foods.map(fd=>`• <b>${fd.qty!==1?fd.qty+' ':''}${fd.key}</b> — ${Math.round(fd.cal*fd.qty)} kcal · ${Math.round(fd.p*fd.qty)}g P · ${Math.round(fd.c*fd.qty)}g C · ${Math.round(fd.f*fd.qty)}g F`).join('\n');
      let follow = left>0
        ? `You're at <b>${state.macros.protein.v}g protein</b> — ${left}g to go. ${left>60?'I\'d slot a shake mid-afternoon and keep dinner protein-heavy.':left>25?'A greek yogurt or a shake covers most of that.':'Basically there — dinner closes it out.'}`
        : `That puts you <b>over your ${state.macros.protein.t}g protein goal</b> — perfectly timed.`;
      return { text:`${pick(f.open)} Looked it up — per-item nutrition from my built-in database:\n\n${lines}\n\n<b>Meal total: ~${tot.cal} kcal · ${tot.p}g protein · ${tot.c}g carbs · ${tot.f}g fat</b> — logged as Meal ${state.meals.length}.\n\n${follow}` };
    }
    return { text:`${pick(f.open)} Tell me what was in it — e.g. "3 eggs, bacon and a cup of rice" — and I'll look up the nutrition for each item and log it. <i>(Full product: live lookup against the USDA database for any food.)</i>` };
  }

  /* done for the day → goal review: celebrate or recommit */
  if(/(done for (the )?day|day is done|calling it (a night|a day)|i'?m done today|end my day|finished for today)/.test(t)){
    const wins = [], misses = [];
    if(state.goalsKnown){
      if(state.macros.protein.v >= state.macros.protein.t) wins.push(`🍗 Protein: <b>${state.macros.protein.v}g / ${state.macros.protein.t}g</b> — nailed it`);
      else misses.push(`🍗 Protein came up short: ${state.macros.protein.v}g of ${state.macros.protein.t}g. Muscle is built in the kitchen as much as the gym — tomorrow, front-load a shake early.`);
      if(state.macros.cal.v <= state.macros.cal.t) wins.push(`🍽 Calories: <b>${state.macros.cal.v.toLocaleString()} / ${state.macros.cal.t.toLocaleString()}</b> — under budget`);
      else misses.push(`🍽 Calories ran ${(state.macros.cal.v-state.macros.cal.t).toLocaleString()} over. One day never breaks a cut — a pattern does. We tighten tomorrow, no drama.`);
    }
    if(state.workoutsGoal){
      if(state.workoutsWtd >= state.workoutsGoal) wins.push(`🏋️ Workouts: <b>${state.workoutsWtd}/${state.workoutsGoal}</b> this week — goal hit`);
      else misses.push(`🏋️ Training: ${state.workoutsWtd} of ${state.workoutsGoal} this week — ${state.workoutsGoal-state.workoutsWtd} to go before Sunday. Your goals don't need perfect days, they need showing up.`);
    }
    if(!misses.length)
      return { text:`🎉 <b>Clean sweep, ${state.user.name}.</b>\n\n${wins.join('\n')}\n\nDays like this are exactly how "${state.goal}" stops being a goal and starts being a fact. Sleep well — 8–9 hours locks in everything you did today. ${pick(f.close)}` };
    return { text:`Day closed. Here's the honest ledger:\n\n${wins.length?wins.join('\n')+'\n\n':''}${misses.join('\n\n')}\n\nRemember why you set <b>${state.goal}</b> as the target. Consistency over intensity — see you tomorrow.` };
  }

  /* what to eat → recipe recommendations */
  if(/(what should i eat|hungry|restaurant|food near|meal idea|eat next|dinner idea|lunch idea|recipe)/.test(t)){
    const left = proteinLeft();
    return { text:`${pick(f.open)} You have <b>~${calLeft()} kcal</b> and <b>${left}g protein</b> left today. Three recipes that fit:\n\n• <b>Chicken &amp; Rice Power Bowl</b> — ~55g P · lean protein + post-workout carbs\n• <b>Greek Yogurt Protein Bowl</b> — ~35g P · casein-rich, great in the evening on a cut\n• <b>Salmon &amp; Quinoa Plate</b> — ~40g P · omega-3s for recovery\n\nAll three are linked on the <b>Fuel tab</b> with the full recipes.` };
  }

  /* macros */
  if(/(macro|calorie|protein).*(left|today|how|show|status)|show my macros|how am i eating/.test(t)){
    const m = state.macros;
    return { text:`Today so far: <b>${m.cal.v} / ${m.cal.t} kcal</b> · <b>${m.protein.v} / ${m.protein.t}g protein</b> · ${m.carbs.v}g carbs · ${m.fat.v}g fat.\n\n${proteinLeft()>0?`Protein is the gap — ${proteinLeft()}g to go.`:'Protein goal ✅ — great day.'} Full breakdown is on the Fuel tab.`, goTab:'fuel' };
  }

  /* soreness (DOMS) vs injury */
  if(/(sore|doms|stiff)/.test(t) && !/(hurt|pain|injur|tweak|pinch)/.test(t)){
    return { info:true, text:`${pick(f.open)} Normal soreness (DOMS) peaks 24–48h after training and it's a sign of novel stimulus, not damage. Best moves: light movement of the same muscles, 10 min of walking, protein + sleep. Training a sore muscle is fine as long as strength isn't down more than ~10%.\n\nIf it's sharp, one-sided, or in a joint rather than the muscle belly — that's different. Tell me and I'll adjust today's plan.` };
  }

  /* supplements */
  if(/(creatine|supplement|whey|pre.?workout|vitamin)/.test(t)){
    return { info:true, text:`${pick(f.open)} My evidence-based shortlist for your goal:\n\n• <b>Creatine monohydrate</b> — 5g daily, any time. The most-studied supplement in existence.\n• <b>Whey/protein powder</b> — only to hit your ${state.macros.protein.t}g target; food first.\n• <b>Caffeine</b> — 2–3mg/kg ~45 min pre-lift on heavy days.\n\nEverything else is margins.` };
  }

  /* "cardio time" → straight to the cardio picker */
  if(/(do|time|let'?s|start|go for|wanna|ready for).{0,12}cardio|cardio.{0,10}(time|session|now)|go (run|running)/.test(t)){
    return { text:`${pick(f.open)} Let's move:`, flow:'cardio' };
  }

  /* cardio (advice) */
  if(/(cardio|running|zone 2|5k|10k|conditioning|treadmill)/.test(t)){
    return { info:true, text:`${pick(f.open)} With your lifting volume, here's the cardio that helps instead of interfering:\n\n• <b>2× Zone 2</b> (30–40 min easy pace) on rest days\n• <b>1× short intervals</b> (8× 30s hard / 90s easy) after an upper day\n\nThat protects recovery for legs. I'll fold these into your week and nudge you on the right days.` };
  }

  /* injury */
  if(/(hurt|pain|tweak|injur|pinch)/.test(t)){
    let part = (t.match(/(shoulder|knee|back|elbow|wrist|hip|neck|ankle|hamstring)/)||[])[1] || 'that area';
    state.memory.unshift({ic:'🩹', t:`Reported ${part} discomfort (today) — monitoring, loads adjusted`});
    renderYou();
    return { text:`${pick(f.open)} Noted — I've added your <b>${part}</b> to my memory and I'll factor it into every plan until it clears up. For today I'm swapping anything that loads it directly and trimming volume 20% on adjacent movements.\n\nIf it's sharp pain (not soreness), skip the session and let's reassess tomorrow. Deal?` };
  }

  /* equipment busy/unavailable */
  if(/(taken|busy|no (bench|rack|dumbbell|cable)|machine.*(broken|taken)|someone.*using|crowded)/.test(t)){
    return { text:`${pick(f.open)} No problem — progression doesn't stop for a crowded gym. Tap the ⇄ button on any exercise in the Train tab and pick a same-muscle-group substitute — I'll re-slot it instantly.`, goTab:'train' };
  }

  /* sleep / recovery */
  if(/(sleep|recover|tired|exhausted|hrv|rest day)/.test(t)){
    return state.hasWearable
      ? { info:true, text:`${pick(f.open)} Last night: <b>${state.recovery.sleep}</b>, HRV <b>${state.recovery.hrv}ms</b>, resting HR ${state.recovery.rhr}. Recovery score <b>${state.recovery.score}%</b>. Target is <b>8–9 h</b> — if tonight runs short, I'll pull tomorrow's volume down ~15%. We only deload if performance <i>and</i> recovery noticeably decline.` }
      : { info:true, text:`${pick(f.open)} I don't have sleep or recovery data yet — connect a watch (Apple Watch, Whoop, Garmin via the NAVI Sync shortcut) and I'll adapt training to how you actually slept.\n\nGeneral rule while we're blind: <b>8–9 h target</b>, and if you feel wrecked, cut today's volume ~15% rather than skipping.` };
  }

  /* water — your goal: 3–4 L/day */
  if(/(water|hydrat|drank)/.test(t)){
    state.water = Math.min(state.waterTarget, Math.round((state.water+0.5)*10)/10);
    return { text:`Logged 💧 — that's <b>${state.water} L of your ${state.waterTarget} L</b> goal today. ${state.water<2?'Behind pace — keep the bottle on you.':'Right on pace.'}` };
  }

  /* memory */
  if(/(remember|know about me|memory|what do you know)/.test(t)){

const FOOD_SYS = 'You are a precise nutrition estimator. Given a meal description or meal photo, reply with ONLY valid JSON, no prose, exactly: {"items":[{"n":"food with portion","cal":0,"p":0,"c":0,"f":0}],"micros":{"Vitamin D":0,"Vitamin B12":0,"Vitamin C":0,"Iron":0,"Calcium":0,"Magnesium":0,"Potassium":0,"Zinc":0,"Fiber":0,"Sodium":0}} — items are each food with integer calories/protein/carbs/fat grams; micros are integer percentages of typical adult daily targets for the WHOLE meal. Estimate typical portions honestly.';
function items0(p){ return (p.items||[]).slice(0,3).map(i=>String(i.n||'').replace(/<[^>]*>/g,'')).join(', ') || 'your meal'; }
async function llmFoodJSON(content){
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'content-type':'application/json', 'x-api-key':state.apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({model:'claude-haiku-4-5', max_tokens:900, system:FOOD_SYS, messages:[{role:'user', content}]})
  });
  if(!res.ok) throw new Error('API ' + res.status);
  const j = await res.json();
  const txt = j.content.map(c=>c.text||'').join('');

function logLLMMeal(parsed, label){
  const items = (parsed.items||[]).map(it=>({
    n: esc(String(it.n||'item').slice(0,60)),
    cal: Math.min(3000, Math.max(0, Math.round(+it.cal||0))),
    p: Math.min(250, Math.max(0, Math.round(+it.p||0))),
    c: Math.min(400, Math.max(0, Math.round(+it.c||0))),
    f: Math.min(250, Math.max(0, Math.round(+it.f||0))),
  })).filter(it=>it.cal>0 || it.p>0);
  if(!items.length) throw new Error('no items');
  const tot = items.reduce((a,x)=>({cal:a.cal+x.cal, p:a.p+x.p, c:a.c+x.c, f:a.f+x.f}), {cal:0,p:0,c:0,f:0});
  state.macros.cal.v += tot.cal; state.macros.protein.v += tot.p;
  state.macros.carbs.v += tot.c; state.macros.fat.v += tot.f;
  const micros = {};
  if(parsed.micros) for(const k of ['Vitamin D','Vitamin B12','Vitamin C','Iron','Calcium','Magnesium','Potassium','Zinc','Fiber','Sodium']){
    const v = Math.round(+parsed.micros[k]||0);
    if(v > 0 && v <= 400) micros[k] = v;
  }
  state.meals.push({n:'Meal', s: esc(String(label).slice(0,80)), cal:tot.cal, p:tot.p, c:tot.c, f:tot.f,
    items: items.map(it=>({n:it.n, cal:it.cal, p:it.p})),
    micros: Object.keys(micros).length ? micros : undefined});
  state.mealIdx = state.meals.length-1;
  state.mealCount = (state.mealCount||0) + 1;
  checkMedals();
  renderFuel(); transientScene('eat');
  return {tot, items};
}

const chatEl = $('#chat-scroll'), inputEl = $('#chat-input');

/* v58/v68: clean chat — messages that arrive together (≤3 s apart, same user turn)
   stay on screen as a bundle; older bundles drop into chat history */
let chatBreakAt = 0;
function applyChatVisibility(){
  const msgs = [...chatEl.children].filter(el => el.id !== 'hist-toggle');
  const now = Date.now();
  msgs.forEach(m => { if(!m.dataset.ts) m.dataset.ts = now; });
  /* walk back from the newest: extend the bundle while gaps are ≤3 s and no user action splits it */
  let start = msgs.length - 1;
  while(start > 0){
    const cur = +msgs[start].dataset.ts, prev = +msgs[start-1].dataset.ts;
    if(cur - prev > 3000) break;
    if(chatBreakAt && prev < chatBreakAt && cur >= chatBreakAt) break;
    start--;
  }
  let tg = document.getElementById('hist-toggle');
  if(msgs.length > 1 && !tg){
    tg = document.createElement('button');
    tg.id = 'hist-toggle';
    tg.type = 'button';
    tg.onclick = ()=>{
      state.chatHistOpen = !state.chatHistOpen;
      applyChatVisibility();
      /* v113: opening history keeps you at the bottom — scroll UP to read older messages */
      chatEl.scrollTop = chatEl.scrollHeight;
    };
    chatEl.prepend(tg);
  }
  if(tg){
    tg.style.display = (start > 0 || state.chatHistOpen) ? '' : 'none';
    tg.textContent = state.chatHistOpen ? '▴ Hide chat history' : `▾ Show chat history (${start})`;
  }
  msgs.forEach((m,i)=>{ m.style.display = (state.chatHistOpen || i >= start) ? '' : 'none'; });
}
function scrollChat(){ applyChatVisibility(); chatEl.scrollTop = chatEl.scrollHeight; }
/* every append path — even ones that skip scrollChat — keeps the clean-chat rule */
new MutationObserver(()=>applyChatVisibility()).observe(chatEl, {childList:true});

      g.gain.setValueAtTime(0.0001, t0 + dt);
      g.gain.exponentialRampToValueAtTime(0.3, t0 + dt + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dt + 0.5);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t0 + dt); o.stop(t0 + dt + 0.55);
    });
  }catch(e){}
  try{ if(navigator.vibrate) navigator.vibrate([180, 90, 180]); }catch(e){}
}

function recordSession(){
  if(state.sessRecorded) return;
  state.sessRecorded = true;
  const dk = dayKey(simDate());
  /* v80: comeback detection — gap since the most recent trained day */
  if(state.trainedDays.length){
    const last = state.trainedDays[state.trainedDays.length-1].split('-').map(Number);
    const gap = (simDate() - new Date(last[0], last[1], last[2])) / 864e5;
    if(gap >= 14) state.comebackHit = true;
  }
  /* v80: session volume (weight × reps) feeds One-Ton Day + Million Pound Club */
  const vol = state.exercises.flatMap(e=>e.done.filter(Boolean)).reduce((a,d)=> a + ((typeof d.w==='number' && d.w>0 && d.r) ? d.w*d.r : 0), 0);
  state.sessVolume = Math.round(vol);
  state.lifeVolume = (state.lifeVolume||0) + state.sessVolume;
  const hh = new Date().getHours();
  if(hh < 7) state.earlyHit = true;
  if(hh >= 21) state.lateHit = true;
  if(!state.trainedDays.includes(dk)) state.trainedDays.push(dk);
  state.burnLog = state.burnLog || [];
  state.burnLog.push(state.exercises.flatMap(e=>e.done.filter(Boolean)).reduce((a,d)=>a+(d.cal||0),0));
  const label = simDate().toLocaleString('en-US',{month:'short', day:'numeric'});
  /* browsable from the Train calendar from now on — appends, never overwrites */
  pushHistory(label, {
    name: `${state.sessionName} · ${simDate().toLocaleString('en-US',{weekday:'short'})}`,
    time: new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
    ex: state.exercises.filter(e=>e.done.filter(Boolean).length || e.completed).map(e=>({
      n: e.n,
      pr: (!e.seg && typeof e.target.w==='number' && e.target.w > parseFloat(e.last)) || undefined,
      sets: e.seg ? ['✓ complete'] : e.done.filter(Boolean).map(d=>`${(typeof d.w==='number' && d.w) ? d.w : 'BW'} × ${d.r}`),
    })),
  });
  state.exercises.filter(e=>!e.seg && e.done.filter(Boolean).length).forEach(e=>{
    const w = typeof e.target.w==='number' ? e.target.w : null;
    if(w==null) return;
    const key = NAME2KEY[e.n] || ('x_' + e.n.toLowerCase().replace(/[^a-z]+/g,'_'));
    const ds = state.strengthData[key];
    const doneSets = e.done.filter(Boolean);
    if(ds){
      if(!ds.weeks) ds.weeks = [];
      ds.weeks.push(label);
      ds.vals.push(w);
      if(ds.reps) ds.reps.push(Math.max(...doneSets.map(d=>d.r||0)) || 8);
      ds.hr.push(Math.max(...doneSets.map(d=>d.hr||0)) || 0);
      ds.cal.push(doneSets.reduce((a,d)=>a+(d.cal||0),0) || 40);
    }
    /* plateau tracking: same-or-lower top weight than last time = a stalled session */
    const lastW = parseFloat(e.last);
    if(!isNaN(lastW)) state.stalls[e.n] = w <= lastW ? (state.stalls[e.n]||0)+1 : 0;
    /* PR wall */
    const m = state.medals.find(x=>x.n===e.n);
    if(m){
      const cur = parseFloat(m.pr);
      if(isNaN(cur) || w > cur){
        m.pr = `${w} lb`; m.isNew = true;
        (m.hist = m.hist||[]).unshift([label, `${w} lb`, isNaN(cur) ? '—' : `+${+(w-cur).toFixed(1)}`]);
      }
    }
  });
  checkMedals();
  renderProgress(); renderYou();
}

/* v115: reopening pops exactly what recordSession pushed, so re-finishing
   REPLACES today's entry instead of duplicating it */
function unrecordSession(){
  if(!state.sessRecorded) return;
  if(state.burnLog && state.burnLog.length) state.burnLog.pop();
  state.lifeVolume = Math.max(0, (state.lifeVolume||0) - (state.sessVolume||0));
  state.workoutsWtd = Math.max(0, state.workoutsWtd - 1);
  const label = simDate().toLocaleString('en-US',{month:'short', day:'numeric'});
  const h = state.history[label];
  if(h && h.multi){ h.sessions.pop(); if(h.sessions.length === 1) state.history[label] = h.sessions[0]; }
  else if(h) delete state.history[label];
  state.exercises.filter(e=>!e.seg && e.done.filter(Boolean).length).forEach(e=>{
    if(typeof e.target.w !== 'number') return;
    const key = NAME2KEY[e.n] || ('x_' + e.n.toLowerCase().replace(/[^a-z]+/g,'_'));
    const ds = state.strengthData[key];
    if(ds && ds.weeks && ds.weeks.length && ds.weeks[ds.weeks.length-1] === label){
      ds.weeks.pop(); ds.vals.pop(); if(ds.reps) ds.reps.pop(); ds.hr.pop(); ds.cal.pop();

}

/* dynamic coaching reaction when a set is adjusted away from the plan */
function reactToSet(e, w, r){
  const low = repLow(e), top = repTop(e);
  const wStr = load(w);
  if(r < low){
    e.note = `Under range today — holding ${wStr} next session, no jump`;
    renderTrain();
    toast(`Adjusted — ${wStr} × ${r}`);
    addMsg(`Logged <b>${e.n}</b> at ${wStr} × ${r} — that's under your target of ${e.target.r}. No problem: we <b>hold ${wStr} next session</b> instead of adding, and if the next set feels heavy, cut it a rep early. One tough set doesn't change the plan; a tough week does.`, 'bot');
  } else if(r > top){
    e.note = `Beat the range — next session earns a weight jump`;
    renderTrain();
    toast(`💪 ${wStr} × ${r} — beat the range!`);
    addMsg(`<b>${e.n}</b>: ${wStr} × ${r} — you beat your target. By your own rule, if the remaining sets land at the top too, <b>next session goes up 2.5 lb</b>. Keep the eccentrics honest.`, 'bot');
  } else {
    toast(`Adjusted — ${wStr} × ${r}`);
  }
  checkProgression(e);
}

function undoLastSetFor(i){
  const e = state.exercises[i];
  if(!e || !e.done.length) return;
  const d = e.done.pop();
  state.burned = Math.max(0, state.burned - (d.cal||0));
  if(state.lastLogged && state.lastLogged.i===i) state.lastLogged = null;
  hideRestOverlay();
  renderTrain(); renderFuel();
  toast(`↩ Undone — set removed from ${e.n}`);
}

/* your rule: +weight only when EVERY set reaches the top of the range */
function checkProgression(e){
  if(e.seg || e.done.length < e.sets) return;
  const top = repTop(e);
  if(e.done.every(d=>d.r >= top && d.w >= e.target.w)){
    toast(`🎉 ${e.n}: all sets at the top — +2.5 lb next session`);
  }
}

        ${state.swapSel===i && e.cardioSeg ? `

    if(e.seg){ e.done[s] = {w:0, r:0, hr, cal}; renderTrain(); renderFuel(); toast(`Complete ✅${hr?` · ♥ ${hr} bpm`:''}`); return; }
    const top = repTop(e);
    e.done[s] = {w:e.target.w, r:top, hr, cal};
    state.lastLogged = {i, s};
    const isPR = typeof e.target.w==='number' && e.target.w > parseFloat(e.last);
    renderTrain();
    renderFuel();
    if(e.done.length < e.sets) startRest(e.restSec || (e.comp?150:75));   // custom, else 2.5 min compound / 75 s isolation
    if(isPR && s===0){ celebratePR(e, e.target.w); }
    else toast(`Set ${s+1}: ${load(e.target.w)} × ${top}${hr?` · ♥ ${hr}`:''} — tap the row to adjust`);
    checkProgression(e);
  });
  const cvStep = (i, k, dir)=>{
    const e = state.exercises[i];
    const cc = CARDIO_CFG[segCardioType(e.n)].find(x=>x.k===k);
    if(!cc || !e.cardVals) return;
    const min = k==='dur' ? 1 : (k==='inc' ? 0 : cc.step);
    e.cardVals[k] = Math.max(min, +(e.cardVals[k] + dir*cc.step).toFixed(1));
    if(k==='dur') e.cardDur = e.cardVals[k];
    if(k==='speed') e.cardSpeed = e.cardVals[k];
    renderTrain();
  };
  el.querySelectorAll('[data-cvdn]').forEach(b=> b.onclick = ()=>{ const [i,k]=b.dataset.cvdn.split(':'); cvStep(+i, k, -1); });
  el.querySelectorAll('[data-cvup]').forEach(b=> b.onclick = ()=>{ const [i,k]=b.dataset.cvup.split(':'); cvStep(+i, k, 1); });
  el.querySelectorAll('[data-cmodeseg]').forEach(b=> b.onclick = ()=>{
    const [i, m] = b.dataset.cmodeseg.split(':');
    const e = state.exercises[+i];
    if((e.cardMode === 'up') === (m === 'up')) return;
    e.cardMode = m;
    renderTrain();
    toast(m === 'up' ? '∞ Open-ended — run until you end it' : '⏱ Countdown set');
  });
  el.querySelectorAll('[data-cvval]').forEach(inp=> inp.onchange = ()=>{
    const [i,k] = inp.dataset.cvval.split(':');
    const e = state.exercises[+i];
    const cc = CARDIO_CFG[segCardioType(e.n)].find(x=>x.k===k);
    if(!cc || !e.cardVals){ renderTrain(); return; }
    let v = parseFloat(inp.value);
    if(isNaN(v)){ renderTrain(); return; }
    v = k==='dur' ? Math.max(1, Math.round(v)) : k==='speed' ? Math.max(0.1, Math.round(v*10)/10) : k==='inc' ? Math.max(0, Math.round(v*2)/2) : Math.max(cc.step, Math.round(v));
    e.cardVals[k] = v;
    if(k==='dur') e.cardDur = v;
    if(k==='speed') e.cardSpeed = v;
    renderTrain();
  });
  el.querySelectorAll('[data-cunit]').forEach(b=> b.onclick = ()=>{
    const e = state.exercises[+b.dataset.cunit];
    const cur = e.cardUnit||'mph';
    const v = (e.cardVals && e.cardVals.speed) || e.cardSpeed || 3.5;
    const nv = +(cur==='mph' ? v*1.609 : v/1.609).toFixed(1);
    if(e.cardVals) e.cardVals.speed = nv;
    e.cardSpeed = nv;
    e.cardUnit = cur==='mph' ? 'kph' : 'mph';
    renderTrain();
  });
  el.querySelectorAll('[data-undostart]').forEach(b=> b.onclick = ()=>{
    state.activeSet = null;
    renderTrain();
    toast('↩ Set cancelled — nothing recorded');
  });
  el.querySelectorAll('[data-undoset]').forEach(b=> b.onclick = ()=>{
    undoLastSetFor(+b.dataset.undoset);
  });
  el.querySelectorAll('[data-skipseg]').forEach(b=> b.onclick = ()=>{
    const e = state.exercises[+b.dataset.skipseg];
    e.completed = true; e.done[0] = {w:0, r:0, hr:0, cal:0};
    renderTrain();
    finishWorkoutSummary();
  });
  const rs = el.querySelector('#reopen-sess');
  if(rs) rs.onclick = ()=>{
    unrecordSession();
    state.exercises.forEach(e=>{ if(!e.cardioSeg) e.completed = false; });
    state.sessEdit = true;
    renderTrain();
    toast('✎ Session reopened — adjust anything, then re-record');
  };
  const rr = el.querySelector('#rerecord-sess');
  if(rr) rr.onclick = ()=>{
    state.exercises.forEach(e=>{ if(e.done.filter(Boolean).length >= e.sets) e.completed = true; });
    finishWorkoutSummary();
    renderTrain();
  };
  const axb = el.querySelector('#add-ex-btn');
  if(axb) axb.onclick = ()=>{ state.addExOpen = !state.addExOpen; renderTrain(); };
  const axg = el.querySelector('#add-ex-go');
  if(axg) axg.onclick = ()=>{
    const v = el.querySelector('#add-ex-pick').value;
    if(v.startsWith('cardio:')){
      const n = v.slice(7);
      state.exercises.push({...CARDIO, n, done:[], target:{w:'',r:''}});
      state.addExOpen = false; renderTrain();
      toast(`➕ ${n} added — unlocks after your lifts`);
      return;
    }
    const mg = NAME2MG[v] || '';
    const m = state.medals.find(x=>x.n===v);
    const pr = m && m.pr !== '—' ? parseFloat(m.pr) : 0;
    const w = pr ? Math.round(pr/2.5)*2.5 : Math.max(2.5, Math.round((MG_BASE[mg]||60)*0.6/2.5)*2.5);
    state.exercises.push({ n:v, note:'added today', last: m && m.pr !== '—' ? m.pr : '—', target:{w, r:10}, sets:3, pr:pr||0, comp:isComp(v), alt:'', why:'', done:[] });
    state.addExOpen = false; renderTrain();
    toast(`➕ ${v} added to today's session`);
  };
  el.querySelectorAll('[data-removeex]').forEach(b=> b.onclick = ()=>{
    const i = +b.dataset.removeex;
    if(!b.dataset.armed){
      b.dataset.armed = '1'; b.textContent = 'remove?';
      setTimeout(()=>{ if(b.isConnected){ b.dataset.armed = ''; b.textContent = '✕'; } }, 2600);
      return;
    }
    const gone = state.exercises[i];
    const loggedSets = gone.done.filter(Boolean);
    /* its logged sets come off the session's internal burn total */
    loggedSets.forEach(d=>{ state.burned = Math.max(0, state.burned - (d.cal||0)); });
    if(state.activeSet && state.activeSet.i === i) state.activeSet = null;
    state.exercises.splice(i, 1);
    if(state.activeSet && state.activeSet.i > i) state.activeSet.i--;
    if(!state.exercises.length){
      /* the whole session was removed — back to "no plan yet" */
      state.planReady = false;
      state.sess = {run:false, paused:false, sec:0};
      clearInterval(sessI);
      hideRestOverlay();
    }
    renderTrain(); renderFuel();
    toast(`Removed ${gone.n}${loggedSets.length ? ' — its sets came off the session' : ''}`);
  });
  el.querySelectorAll('[data-endwork]').forEach(b=> b.onclick = ()=>{
    const i = +b.dataset.endwork;
    state.exercises[i].completed = true;
    state.adj = null; state.swapSel = null;
    hideRestOverlay();
    renderTrain();
    const next = state.exercises.find(ex=>!ex.completed);
    if(next) toast(`✓ ${state.exercises[i].n} done — up next: ${next.n}`);
    else finishWorkoutSummary();
  });
  el.querySelectorAll('[data-wdn]').forEach(b=> b.onclick = ()=>{ const e=state.exercises[+b.dataset.wdn]; if(typeof e.target.w==='number') e.target.w = Math.max(wFloor(e), +(e.target.w-2.5).toFixed(1)); renderTrain(); });
  el.querySelectorAll('[data-wup]').forEach(b=> b.onclick = ()=>{ const e=state.exercises[+b.dataset.wup]; if(typeof e.target.w==='number') e.target.w = +(e.target.w+2.5).toFixed(1); renderTrain(); });
  /* typed values snap to sensible increments: weight → nearest 2.5, rest → nearest 5s */
  el.querySelectorAll('[data-wval]').forEach(inp=> inp.onchange = ()=>{
    const e = state.exercises[+inp.dataset.wval];
    let v = parseFloat(inp.value);
    if(isNaN(v)){ renderTrain(); return; }
    if(state.units==='kg') v = v/LB2KG;
    v = Math.round(v/2.5)*2.5;
    e.target.w = Math.max(wFloor(e), +v.toFixed(1));
    renderTrain();
    toast(`Weight set: ${load(e.target.w)}`);
  });
  el.querySelectorAll('[data-setsval]').forEach(inp=> inp.onchange = ()=>{
    const e = state.exercises[+inp.dataset.setsval];
    const v = parseInt(inp.value);
    if(!isNaN(v)) e.sets = Math.min(8, Math.max(Math.max(1, e.done.length), v));
    renderTrain();
  });
  el.querySelectorAll('[data-repsval]').forEach(inp=> inp.onchange = ()=>{
    const e = state.exercises[+inp.dataset.repsval];
    const v = parseInt(inp.value);
    if(!isNaN(v)) e.target.r = Math.min(30, Math.max(1, v));
    renderTrain();
  });
  el.querySelectorAll('[data-restval]').forEach(inp=> inp.onchange = ()=>{
    const e = state.exercises[+inp.dataset.restval];
    const v = parseInt(inp.value);
    if(!isNaN(v)) e.restSec = Math.min(600, Math.max(15, Math.round(v/5)*5));
    renderTrain();
  });
  el.querySelectorAll('[data-restdn]').forEach(b=> b.onclick = ()=>{ const e=state.exercises[+b.dataset.restdn]; e.restSec = Math.max(15, (e.restSec || (e.comp?150:75)) - 15); renderTrain(); });
  el.querySelectorAll('[data-restup]').forEach(b=> b.onclick = ()=>{ const e=state.exercises[+b.dataset.restup]; e.restSec = Math.min(300, (e.restSec || (e.comp?150:75)) + 15); renderTrain(); });
  el.querySelectorAll('[data-setsdn]').forEach(b=> b.onclick = ()=>{ const e=state.exercises[+b.dataset.setsdn]; e.sets = Math.max(Math.max(1, e.done.length), e.sets-1); renderTrain(); });
  el.querySelectorAll('[data-setsup]').forEach(b=> b.onclick = ()=>{ const e=state.exercises[+b.dataset.setsup]; e.sets = Math.min(8, e.sets+1); renderTrain(); });
  el.querySelectorAll('[data-repsdn]').forEach(b=> b.onclick = ()=>{ const e=state.exercises[+b.dataset.repsdn]; e.target.r = Math.max(1, repTop(e)-1); renderTrain(); });
  el.querySelectorAll('[data-repsup]').forEach(b=> b.onclick = ()=>{ const e=state.exercises[+b.dataset.repsup]; e.target.r = Math.min(30, repTop(e)+1); renderTrain(); });
  el.querySelectorAll('[data-adj]').forEach(b=> b.onclick = ()=>{
    const [i,s] = b.dataset.adj.split(':').map(Number);
    const d = state.exercises[i].done[s];
    state.adj = {i, s, w:d.w, r:d.r};
    renderTrain();
  });
  if(state.adj){
    const a = state.adj, e = state.exercises[a.i];
    const paint = ()=>{ $('#adj-w').value = typeof a.w==='number' ? (state.units==='kg' ? +(a.w*LB2KG).toFixed(1) : a.w) : a.w; $('#adj-r').value = a.r; };
    const step = (k,v)=>{ if(k==='w'&&typeof a.w==='number') a.w=Math.max(-300,+(a.w+v).toFixed(1)); if(k==='r') a.r=Math.max(0,a.r+v); paint(); };
    $('#adj-w-dn').onclick = ()=>step('w',-2.5); $('#adj-w-up').onclick = ()=>step('w',2.5);
    $('#adj-r-dn').onclick = ()=>step('r',-1); $('#adj-r-up').onclick = ()=>step('r',1);
    $('#adj-w').onchange = ()=>{ let v = parseFloat($('#adj-w').value); if(!isNaN(v)){ if(state.units==='kg') v = v/LB2KG; a.w = Math.max(-300, +(Math.round(v/2.5)*2.5).toFixed(1)); } paint(); };
    $('#adj-r').onchange = ()=>{ const v = parseInt($('#adj-r').value); if(!isNaN(v)) a.r = Math.max(0, Math.min(50, v)); paint(); };
    $('#adj-save').onclick = ()=>{
      e.done[a.s] = {w:a.w, r:a.r, hr:(e.done[a.s]||{}).hr||0, cal:(e.done[a.s]||{}).cal||10};
      state.lastLogged = {i:a.i, s:a.s};
      state.adj = null;
      renderTrain();
      reactToSet(e, a.w, a.r);
    };
  }
  el.querySelectorAll('[data-swap]').forEach(b=> b.onclick = ()=>{
    const i = b.dataset.swap|0, e = state.exercises[i];
    if(e.cardioSeg || NAME2MG[e.n]){ state.swapSel = state.swapSel===i? null : i; state.adj = null; renderTrain(); return; }
    const old = e.n;
    e.n = e.alt; e.alt = old; e.note = `Swapped in — ${e.why}`;
    renderTrain();
    toast(`Swapped: ${old} → ${e.n}`);
  });
  const swapApply = el.querySelector('#swap-apply');
  if(swapApply) swapApply.onclick = ()=>{
    const i = state.swapSel, e = state.exercises[i];
    const name = el.querySelector('#swap-pick').value;
    if(e.cardioSeg){
      const old2 = e.n;
      e.n = name;
      e.cardVals = null; e.cardSpeed = null; e.cardUnit = 'mph';
      state.swapSel = null;
      renderTrain();
      toast(`Cardio swapped: ${name}`);
      return;
    }
    const old = e.n;
    e.alt = old; e.n = name; e.note = `Swapped in — same ${NAME2MG[old]} stimulus`;
    e.comp = isComp(name);
    if(!state.medals.some(m=>m.n===name)) state.medals.push({e:'🏋️', n:name, pr:'—', isNew:false, hist:[]});
    state.swapSel = null;
    renderTrain();
    toast(`Swapped: ${old} → ${name}`);
  };
  renderSprite();
}

const ALL_RECIPES = (()=>{
  const out = [...CORE_RECIPES, ...ALLRECIPES_CLASSICS];
  for(const [c, tmpls] of Object.entries(RECIPE_STYLES)){
    for(const [p, info] of Object.entries(RECIPE_PROTS)){
      for(const t of tmpls){
        const word = p==='Vegetarian' ? (VEG_WORD[c]||'Tofu') : p;
        const n = t.replace('X', word);
        if(out.some(x=>x.n===n)) continue;
        const h = hashN(n);
        const g = info.lo + h % (info.hi - info.lo + 1);
        const k = Math.round((info.klo + (h*7) % (info.khi - info.klo + 1))/10)*10;
        const whyArr = RECIPE_WHY[p];
        out.push({c, p, n, why: whyArr[h % whyArr.length], m:`~${g}g protein · ${k} kcal`, href:'https://www.allrecipes.com/search?q='+encodeURIComponent(n)});
      }
    }
  }
  return out;
})();

    <div class="section-label">Energy balance</div>
    <div class="card" style="display:flex;align-items:center;gap:12px">
      <div class="ic num" style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(235,104,52,.15);color:#eb6834;font-size:16px">🔥</div>

      <div style="text-align:right"><b style="font-size:17px;color:#eb6834">~${state.burned}</b> <span style="font-size:11px;color:var(--muted)">kcal</span>
        <div style="font-size:11px;color:var(--muted)">net today: ~${(m.cal.v - state.burned).toLocaleString()} kcal</div></div>
    </div>
    <div class="section-label">Today's fuel</div>
    <div class="card">
      ${rows.map(r=>{
        const d = m[r.k];
        const big = r.k==='cal';
        return `<div class="meter" style="${big?'margin-bottom:18px':''}">
          <div class="m-row" style="${big?'font-size:16px':''}">
            <span class="lab" style="${big?'font-weight:700;color:var(--ink)':''}"><i style="background:${r.col}${big?';width:11px;height:11px':''}"></i>${r.lab}</span>
            <span class="val" style="${big?'font-size:15px':''}"><b style="${big?'font-size:19px':''}">${d.v.toLocaleString()}</b> / ${state.goalsKnown ? d.t.toLocaleString()+r.unit : 'N/A'}</span>
          </div>
          <div class="track" style="background:${r.trk};display:flex;gap:2px;${big?'height:15px':''}">
            ${state.meals.map((ml,mi)=>{
              const val = ml[r.fld]||0, pct = Math.min(100, val/d.t*100);
              return pct>0.5 ? `<div class="fill" title="${ml.s} — ${val}${r.unit} (${Math.round(val/Math.max(1,d.v)*100)}% of today's ${r.lab.toLowerCase()})" style="width:${pct}%;background:${r.col};opacity:${[1,.62,.42,.3,.24][mi%5]}"></div>` : '';
            }).join('')}
          </div>
        </div>`;
      }).join('')}
      <p style="font-size:11px;color:var(--muted);margin-top:2px">Each bar segment = one meal, in the order you logged them (darkest first). Tap a segment to see its share.</p>

      <div class="micros">
        ${state.meals.length ? microEst().map(mi=>`
          <div class="micro">
            <span class="mi-n">${mi.n}</span>
            <div class="mi-track" style="${mi.warn?'background:rgba(250,178,25,.15)':''}"><div class="mi-fill" style="width:${Math.min(100,mi.v)}%;${mi.warn?'background:var(--warning)':''}"></div></div>

          ${['Any','Chicken','Beef','Pork','Turkey','Shrimp','Fish','Lamb','Vegetarian'].map(pz=>`<option value="${pz}" ${state.protein===pz?'selected':''}>${pz==='Any'?'\ud83c\udf57 Any protein':pz}</option>`).join('')}
        </select>
      </div>
      ${(()=>{
        const R0 = ALL_RECIPES.filter(x=> (state.cuisine==='Any'||x.c===state.cuisine) && (state.protein==='Any'||x.p===state.protein));
        const seed = state.recipeSeed || 7;
        const R = R0.map(x=>[hashN(x.n + '·' + seed), x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
        if(!R.length) return `<div style="font-size:13px;color:var(--muted);padding:16px 10px;text-align:center;border:1px dashed var(--hairline);border-radius:12px">No ${state.protein==='Any'?'':state.protein.toLowerCase()+' '}picks in ${state.cuisine==='Any'?'this combo':state.cuisine} yet — try another protein or cuisine.</div>`;
        state.recipeIdx = Math.min(state.recipeIdx||0, R.length-1);
        const r = R[state.recipeIdx];
        return `
        <div style="display:flex;align-items:center;gap:8px">

const RANGE_MAP = {'7 days':2, '14 days':3, '1 month':5, '3 months':8, '6 months':8, 'YTD':8, 'ALL':999};
function chartData(){
  const raw = state.strengthData[state.strengthKey];
  const n = RANGE_MAP[state.chartRangeKey] || 8;
  const m = state.chartMetric==='cal' ? 'val' : state.chartMetric;
  const km2disp = km => state.units==='kg' ? km : km * 0.621371;
  const ds = {
    name: raw.name,
    vals: (m==='hr' ? raw.hr : m==='cal' ? raw.cal : m==='dist' ? (raw.dist||[]).map(v=>+km2disp(v).toFixed(2)) : raw.vals).slice(-n),
    reps: (m==='val' && raw.reps) ? raw.reps.slice(-n) : null,
    unit: m==='hr' ? 'bpm' : m==='cal' ? 'kcal' : m==='dist' ? (state.units==='kg' ? 'km' : 'mi') : raw.unit,
  };
  ds.weeks = (raw.weeks || []).slice(-n);
  return ds;
}
function chartScale(){
  const ds = chartData();
  const lo = Math.min(...ds.vals), hi = Math.max(...ds.vals);
  const pad = Math.max(ds.unit==='min'?0.4:ds.unit==='mins'?12:ds.unit==='bpm'?4:ds.unit==='kcal'?10:(ds.unit==='km'||ds.unit==='mi')?0.5:5, (hi-lo)*0.25);
  const step = ds.unit==='min'?0.5:ds.unit==='mins'?15:(ds.unit==='km'||ds.unit==='mi')?0.5:5;
  return { min: Math.floor((lo-pad)/step)*step, max: Math.ceil((hi+pad)/step)*step, ds };
}
const valFmt = (v, ds) => (ds.unit==='km'||ds.unit==='mi') ? `${(+v).toFixed(1)} ${ds.unit}` : ds.unit==='min' ? (v>=90 ? `${Math.floor(v/60)}:${String(Math.floor(v%60)).padStart(2,'0')}:${String(Math.round((v%1)*60)).padStart(2,'0')}` : `${Math.floor(v)}:${String(Math.round(v%1*60)).padStart(2,'0')}`) : ds.unit==='mins' ? `${Math.round(v)} min` : ds.unit==='bpm' ? `${Math.round(v)} bpm` : ds.unit==='kcal' ? `${Math.round(v)} kcal` : `${v} lb`;

function strengthChart(){
  const {min, max, ds} = chartScale();
  const d = { weeks: ds.weeks, vals: ds.vals };
  const W=360, H=170, P={l:38,r:16,t:14,b:24};
  const x = i => d.vals.length < 2 ? P.l + (W-P.l-P.r)/2 : P.l + i*(W-P.l-P.r)/(d.vals.length-1);
  const y = v => P.t + (1 - (v-min)/(max-min)) * (H-P.t-P.b);
  const pts = d.vals.map((v,i)=>[x(i),y(v)]);
  const path = pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area = path + ` L${pts[pts.length-1][0].toFixed(1)} ${H-P.b} L${pts[0][0].toFixed(1)} ${H-P.b} Z`;
  const tstep = (max-min)/3;
  const ticks = [min+tstep, min+2*tstep].map(v=> ds.unit==='min' ? Math.round(v*2)/2 : ds.unit==='mins' ? Math.round(v/15)*15 : Math.round(v/5)*5);
  const last = pts[pts.length-1];
  return `
  <svg viewBox="0 0 ${W} ${H}" id="strength-svg" data-w="${W}">
    ${ticks.map(v=>`<line x1="${P.l}" x2="${W-P.r}" y1="${y(v)}" y2="${y(v)}" stroke="var(--grid)" stroke-width="1"/>
      <text x="${P.l-7}" y="${y(v)+3.5}" font-size="10" fill="var(--muted)" text-anchor="end" font-variant-numeric="tabular-nums">${ds.unit==='min'?valFmt(v,ds):v}</text>`).join('')}
    <line x1="${P.l}" x2="${W-P.r}" y1="${H-P.b}" y2="${H-P.b}" stroke="var(--baseline)" stroke-width="1"/>
    ${[...new Set([0, Math.floor((d.vals.length-1)/2), d.vals.length-1])].map(i=>`<text x="${x(i)}" y="${H-8}" font-size="10" fill="var(--muted)" text-anchor="middle">${d.weeks[i]||''}</text>`).join('')}
    <path d="${area}" fill="#3987e5" opacity="0.10"/>
    <path d="${path}" fill="none" stroke="#3987e5" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <line id="crosshair" x1="0" x2="0" y1="${P.t}" y2="${H-P.b}" stroke="var(--baseline)" stroke-width="1" opacity="0"/>
    <circle id="hover-dot" r="4.5" fill="#3987e5" stroke="var(--surface)" stroke-width="2" opacity="0"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="4.5" fill="#3987e5" stroke="var(--surface)" stroke-width="2"/>
    <text x="${last[0]-2}" y="${last[1]-10}" font-size="11" font-weight="650" fill="var(--ink)" text-anchor="end">${valFmt(d.vals[d.vals.length-1], ds)}</text>
  </svg>`;
}

function wireStrengthChart(){
  const svg = $('#strength-svg'); if(!svg) return;
  const {min, max, ds} = chartScale();
  const d = { weeks: ds.weeks, vals: ds.vals };
  const W=360, P={l:38,r:16}, H=170, Pt=14, Pb=24;
  const cross = svg.querySelector('#crosshair'), dot = svg.querySelector('#hover-dot');
  const xOf = i => d.vals.length < 2 ? P.l + (W-P.l-P.r)/2 : P.l + i*(W-P.l-P.r)/(d.vals.length-1);
  const yOf = v => Pt + (1-(v-min)/(max-min))*(H-Pt-Pb);
  const move = ev =>{
    const r = svg.getBoundingClientRect();
    const cx = (ev.touches?ev.touches[0].clientX:ev.clientX);
    const px = (cx - r.left) / r.width * W;
    let i = d.vals.length < 2 ? 0 : Math.round((px-P.l)/((W-P.l-P.r)/(d.vals.length-1)));
    i = Math.max(0, Math.min(d.vals.length-1, i));
    cross.setAttribute('x1',xOf(i)); cross.setAttribute('x2',xOf(i)); cross.setAttribute('opacity',1);
    dot.setAttribute('cx',xOf(i)); dot.setAttribute('cy',yOf(d.vals[i])); dot.setAttribute('opacity',1);
    const sx = r.left + xOf(i)/W*r.width, sy = r.top + yOf(d.vals[i])/H*r.height;
    showTip(`<b>${valFmt(d.vals[i], ds)}</b>${ds.reps?` × ${ds.reps[i]} reps`:''}<br>${d.weeks[i]}`, sx, sy);
    ev.preventDefault();
  };
  const out = ()=>{ cross.setAttribute('opacity',0); dot.setAttribute('opacity',0); hideTip(); };
  svg.addEventListener('mousemove',move); svg.addEventListener('touchstart',move,{passive:false});
  svg.addEventListener('touchmove',move,{passive:false});
  svg.addEventListener('mouseleave',out); svg.addEventListener('touchend',out);
}

function sleepSet(k){
  const n = {'7N':7, '14N':14, '1M':30, '3M':90, '6M':180, 'YTD':365, 'ALL':365}[k] || 7;
  const rows = state.sleepLog.slice(-n);
  return {vals: rows.map(r=>r.h), labels: rows.map(r=>r.d), agg:'night'};
}
function sleepChart(){
  const set = sleepSet(state.sleepRange);
  const vals = set.vals, n = vals.length;
  const W=360, H=150, P={l:30,r:14,t:12,b:24};
  const max=10;
  const slot=(W-P.l-P.r)/n;
  const bw = Math.min(22, slot*0.72);
  const y = v => P.t + (1-v/max)*(H-P.t-P.b);
  const labStep = Math.ceil(n/6);
  return `
  <svg viewBox="0 0 ${W} ${H}" id="sleep-svg">
    ${[4,8].map(v=>`<line x1="${P.l}" x2="${W-P.r}" y1="${y(v)}" y2="${y(v)}" stroke="var(--grid)" stroke-width="1"/>
      <text x="${P.l-6}" y="${y(v)+3.5}" font-size="10" fill="var(--muted)" text-anchor="end">${v}h</text>`).join('')}
    <line x1="${P.l}" x2="${W-P.r}" y1="${H-P.b}" y2="${H-P.b}" stroke="var(--baseline)" stroke-width="1"/>
    ${vals.map((v,i)=>{
      const cx = P.l + slot*i + slot/2;
      const low = v < 6.5;
      const r = Math.min(4, bw/2.5);
      const lab = set.labels ? set.labels[i] : (i%labStep===0 ? (set.agg==='week' ? `-${n-1-i}w` : `-${n-1-i}d`) : '');
      return `<path data-bar="${i}" d="M${(cx-bw/2).toFixed(1)} ${H-P.b} V${(y(v)+r).toFixed(1)} Q${(cx-bw/2).toFixed(1)} ${y(v).toFixed(1)} ${(cx-bw/2+r).toFixed(1)} ${y(v).toFixed(1)} H${(cx+bw/2-r).toFixed(1)} Q${(cx+bw/2).toFixed(1)} ${y(v).toFixed(1)} ${(cx+bw/2).toFixed(1)} ${(y(v)+r).toFixed(1)} V${H-P.b} Z"
        fill="${low?'rgba(57,135,229,.35)':'#3987e5'}"/>
      ${lab?`<text x="${cx}" y="${H-8}" font-size="9.5" fill="var(--muted)" text-anchor="middle">${lab}</text>`:''}`;
    }).join('')}
  </svg>`;
}

function wireSleepChart(){
  const svg = $('#sleep-svg'); if(!svg) return;
  const set = sleepSet(state.sleepRange);

function exportRows(){

  return rows;
}

        Rankings stay empty until more users join and opt in.<br>
        Your PRs are already being tracked — the moment the community goes live, you're ranked from day one.
      </div>
      <p style="font-size:11px;color:var(--muted);margin-top:10px">Leaderboards are opt-in and anonymous by default (see Legal in the You tab).</p>
    </div>
    <div style="height:56px"></div>`;
  wireStrengthChart(); wireSleepChart();
  $('#prog-pick').onchange = e=>{ state.progressFilter = e.target.value; renderProgress(); };
  $('#str-pick').onchange = e=>{ state.strengthKey = e.target.value; renderProgress(); };
  $$('#screen-progress [data-cmetric]').forEach(b=> b.onclick = ()=>{ state.chartMetric = b.dataset.cmetric; renderProgress(); });
  $('#range-pick').onchange = e=>{ state.chartRangeKey = e.target.value; renderProgress(); };

  $$('#screen-progress [data-ptab]').forEach(b=> b.onclick = ()=>{ state.progTab = b.dataset.ptab; state.medalsAll = false; state.medalSel = null; renderProgress(); });

  const sa = $('#see-all');

    state.medalsAll = !state.medalsAll;
    if(!state.medalsAll && state.medalSel>5) state.medalSel=null;
    renderProgress();
    if(collapsing){ const w = $('#see-all'); if(w) w.closest('.card').scrollIntoView({block:'nearest'}); }
  };
}

/* what the coach still wants to know — or confirmation it's satisfied */
function memorySuggestions(){
  const has = rx => state.memory.some(m=>rx.test(m.t));
  const sug = [];
  if(!has(/gym|equipment|rack|dumbbell/i)) sug.push(`What equipment do you train with? I'll only program movements you can actually do.`);
  if(!has(/injur|tweak|shoulder|knee|pain|cleared/i)) sug.push(`Any past injuries — even old ones? They change how I program pressing and hinging.`);
  if(!has(/favorite|chicken|yogurt|protein sources|foods you/i)) sug.push(`A few foods you eat on repeat — my meal suggestions get a lot sharper.`);
  if(!state.user.age || !state.user.height) sug.push(`Age and height are still blank — mention them anytime and I'll tune your baselines.`);
  if(!has(/goal/i) && !state.goalText) sug.push(`Clear goals — give me a target and every plan points at it.`);
  return sug;
}

  const del = $('#del-data');

      return;
    }

      const d = new Date(), pad = x=> String(x).padStart(2,'0');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `navi-backup-${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}.json`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>{ try{ URL.revokeObjectURL(a.href); }catch(e){} }, 4000);
      toast('💾 Backup downloaded — keep it somewhere safe');

        naviWiping = true;   /* freeze autosave so the current state can't overwrite the restore */
        localStorage.setItem(SAVE_KEY, JSON.stringify({v: j.v||1, day: j.day || dayKey(new Date()), s: {...j.s, apiKey:null}}));
        toast('📥 Backup restored — reloading…');
        setTimeout(()=> location.reload(), 700);
      }catch(e){ naviWiping = false; toast(`That file isn't a NAVI backup — nothing was changed`); }
    };
    rd.readAsText(f);
  };
  $('#auth-btn').onclick = ()=>{
    state.signedIn = !state.signedIn;
    renderYou();
    toast(state.signedIn ? 'Signed in — welcome back' : 'Signed out — your data stays encrypted');
  };
  $$('#screen-you [data-link]').forEach(a=> a.onclick = e=>{
    e.preventDefault();

  });
  $$('#screen-you [data-units]').forEach(b=> b.onclick = ()=>{
    state.units = b.dataset.units;

    toast(state.units==='kg' ? 'Kilograms everywhere' : 'Pounds everywhere');

  $$('#screen-you [data-theme]').forEach(b=> b.onclick = ()=>{
    state.theme = b.dataset.theme;

  });
  const ens = $('#edit-names-save');
  if(ens) ens.onclick = ()=>{
    const un = esc($('#edit-uname').value.trim()).slice(0,40);

    if(cn) state.coachName = cn.replace(/\b\w/g,c=>c.toUpperCase());
    updateHeader(); renderYou(); renderFuel(); renderTrain(); renderProgress();
    toast('✓ Names updated');
  };
  $$('#screen-you [data-sprsex]').forEach(b=> b.onclick = ()=>{ state.spr.sex = b.dataset.sprsex; renderSprite(); renderYou(); toast({m:'Your coach is ready',f:'Your coach is ready',r:'🤖 Cyborg coach online — systems nominal'}[state.spr.sex]); });
  $$('#screen-you [data-sprk]').forEach(inp=>{
    inp.oninput = ()=>{ state.spr[inp.dataset.sprk] = inp.value; renderSprite(); };
    inp.onchange = ()=>{ renderYou(); };
  });
  const pscroll = $('#persona-scroll');
  $('#p-left').onclick = ()=> pscroll.scrollBy({left:-250, behavior:'smooth'});
  $('#p-right').onclick = ()=> pscroll.scrollBy({left:250, behavior:'smooth'});
  const gscroll = $('#goal-scroll');
  if(gscroll){
    $('#g-left').onclick = ()=> gscroll.scrollBy({left:-140, behavior:'smooth'});
    $('#g-right').onclick = ()=> gscroll.scrollBy({left:140, behavior:'smooth'});
  }
  $('#avatar').onclick = ()=> $('#avatar-in').click();
  $('#avatar-in').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const rd = new FileReader();
    rd.onload = ()=>{ state.avatar = rd.result; renderYou(); toast('Profile photo updated'); };
    rd.readAsDataURL(file);
  });
  $$('#screen-you [data-goal]').forEach(b=> b.onclick = ()=>{
    state.goal = b.dataset.goal; state.rateAdj = 0;
    retuneMacros();
    renderYou(); renderFuel(); updateHud();
    toast(`Goal set: ${state.goal}`);
    const ct = state.macros.cal.t.toLocaleString();
    setTimeout(()=>{ addMsg(`Goal updated to <b>${state.goal}</b>. ${state.goal==='Fat loss'?`I've moved you to a ~500 kcal deficit — <b>${ct} kcal/day</b> — with protein at 1g/lb to protect muscle.`:state.goal==='Muscle gain'?`Running a ~300 kcal surplus — <b>${ct} kcal/day</b> — protein at ${state.macros.protein.t}g. Progressive overload stays the priority.`:state.goal==='Recomposition'?`Calories to maintenance — <b>${ct} kcal/day</b> — protein high, and we'll lean on training quality. Slower, but you'll like the mirror.`:`Holding at maintenance — <b>${ct} kcal/day</b> — training stays progressive so you keep strength.`}`, 'bot'); }, 400);
  });
  $$('#screen-you [data-persona]').forEach(b=> b.onclick = ()=>{
    state.personality = b.dataset.persona;
    const sex = state.spr.sex;
    Object.assign(state.spr, DEFAULT_SPR, THEME_DEFAULTS[sprTheme()] || {}, {sex});
    renderYou();
    const p = flav();
    toast(`${p.e} ${p.t} coach activated`);
    setTimeout(()=>{ addMsg(p.e+' '+pick(p.open)+' New coaching style locked in. '+p.push, 'bot'); }, 300);
  });
  $$('#screen-you [data-del]').forEach(b=> b.onclick = ()=>{
    const m = state.memory.splice(+b.dataset.del,1)[0];
    renderYou(); toast('NAVI forgot: "'+m.t.slice(0,28)+'…"');
  });
  renderSprite();   /* fills the close-up preview after every You-tab rebuild */
}

/* ============================================================
   init — onboarding interview first, briefing after setup
   ============================================================ */
updateHeader();
$('#hud').onclick = ()=>{ state.hudIdx = (state.hudIdx+1)%4; updateHud(); };
$('#hud').addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); state.hudIdx = (state.hudIdx+1)%4; updateHud(); } });
/* the lifter reacts to everything you do */
let hudT = null;
function hudPulse(){
  const fig = $('#hud-fig');
  if(!fig || fig.classList.contains('rest')) return;
  const sc = fig.dataset.scene || 'lift';
  if(sc!=='lift') return;
  const kinds = ['lift','lift','jump','lunge','walk'];
  const kind = kinds[Math.floor(Math.random()*kinds.length)];
  fig.classList.remove('lift','jump','lunge','walk');
  void fig.offsetWidth;
  fig.classList.add(kind);
  clearTimeout(hudT);
  hudT = setTimeout(()=>fig.classList.remove('lift','jump','lunge','walk'), 2600);
}
document.addEventListener('click', e=>{
  if(e.target.closest('button, .chip, .opt-btn, .f-chip, select, .set-btn, .p-card, .goal, .badge')) hudPulse();
}, true);
inputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') hudPulse(); });
/* ← → flip the training calendar while the You tab is open */
document.addEventListener('keydown', e=>{
  if(state.tab!=='you') return;
  const tg = document.activeElement && document.activeElement.tagName;
  if(tg==='INPUT'||tg==='TEXTAREA'||tg==='SELECT') return;
  if(e.key==='ArrowLeft'){ state.calOffset--; renderYou(); }
  else if(e.key==='ArrowRight' && state.calOffset<0){ state.calOffset++; renderYou(); }
});
/* idle roaming — NAVI never just stands there */
setInterval(()=>{ if(document.hidden) return; const fig=$('#hud-fig'); if(fig && !fig.classList.contains('rest') && !fig.className.match(/lift|jump|lunge|walk/)) hudPulse(); }, 6500);
renderSprite();
renderTrain(); renderFuel(); renderProgress(); renderYou();
/* ============================================================
   v47: solo build — everything persists on this device
   ============================================================ */
const SAVE_KEY = 'navi-solo-v1';
let naviWiping = false;
/* one definition of "what a saved NAVI looks like" — used by autosave and Backup alike */
function stateSnapshot(){
  return {...state, apiKey:null, cardio:null, activeSet:null, adj:null, swapSel:null,
    sess:{run:false, paused:false, sec:0}, trainCalOpen:false, trainDate:'Today', dayOffset:0, addExOpen:false};
}
function saveState(){
  if(!state.onboarded || naviWiping) return;
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({v:1, day: dayKey(new Date()), s: stateSnapshot()}));
  }catch(e){ /* storage unavailable/full — run in-memory */ }
}
setInterval(()=>{ if(!document.hidden) saveState(); }, 5000);
/* v50: coming back from another app / lock screen — snap every timer to real elapsed time */
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden) return;
  if(state.sess.run && !state.sess.paused) sessTick();
});
/* keep the screen awake during an active session so timers stay live (best-effort) */
let wakeLock = null;
async function holdWake(){
  try{ if('wakeLock' in navigator && (state.sess.run || (state.cardio && state.cardio.on))) wakeLock = await navigator.wakeLock.request('screen'); }catch(e){}
}
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) holdWake(); });
setInterval(()=>{ if(!wakeLock && (state.sess.run || (state.cardio && state.cardio.on))) holdWake(); }, 4000);
addEventListener('pagehide', saveState);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) saveState(); });

let bootNewDay = false;
(function restoreState(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    if(!saved || !saved.s || !saved.s.onboarded) return;
    Object.assign(state, saved.s);
    /* saves from before v67 have no profileSet — an onboarded profile counts as fully set */
    if(!state.profileSet) state.profileSet = {name:true, age:true, height:true, weight:true};
    ensureCardioDS();   /* v104: older saves gain the per-activity cardio datasets */
    state.apiKey = null; state.cardio = null; state.activeSet = null;
    state.dayOffset = 0; state.trainDate = 'Today'; state.trainCalOpen = false;
    state.sess = {run:false, paused:false, sec:0};
    obStep = -2;
    if(saved.day !== dayKey(new Date())) bootNewDay = true;
  }catch(e){}
})();

/* ---------- v48: Apple Watch sync via the NAVI Sync shortcut ---------- */
function ingestWatchSync(){
  try{
    const q = new URLSearchParams(location.search);
    const num = (k, lo, hi) => { const v = parseFloat(q.get(k)); return (isFinite(v) && v >= lo && v <= hi) ? v : null; };
    const sleep = num('sleep', 0, 16), rhr = num('rhr', 30, 120), hrv = num('hrv', 5, 200),
          wt = num('wt', 60, 700), kcal = num('kcal', 0, 8000),
          wkcal = num('wkcal', 1, 4000), wavg = num('wavg', 50, 220), wmax = num('wmax', 60, 230), wmin = num('wmin', 1, 600);
    if(sleep===null && rhr===null && hrv===null && wt===null && kcal===null && wkcal===null && wavg===null && wmax===null) return false;
    state.hasWearable = true;
    if(sleep!==null){
      state.recovery.sleepH = +sleep.toFixed(1);
      const hh = Math.floor(sleep), mm = Math.round((sleep-hh)*60);
      state.recovery.sleep = `${hh}h ${String(mm).padStart(2,'0')}m`;
    }
    if(rhr!==null) state.recovery.rhr = Math.round(rhr);
    if(hrv!==null) state.recovery.hrv = Math.round(hrv);
    /* recovery score from what the watch gave us */
    const sH = state.recovery.sleepH || 7, hv = state.recovery.hrv || 55, rh = state.recovery.rhr || 56;
    state.recovery.score = Math.min(98, Math.max(35, Math.round(sH*8 + hv*0.3 + (65-rh)*0.6)));
    if(wt!==null){
      const delta = (wt - (state.weightNow || wt)).toFixed(1);
      state.user.weight = wt; state.weightNow = wt; state.weighedToday = true;
      state.macros.protein.t = Math.round(Math.max(150, wt));
      retuneMacros();
      checkMedals();
      state.memory.unshift({ic:'⚖️', t:`Watch sync weigh-in: ${wt} lb (${delta>0?'+':''}${delta})`});
    }
    if(kcal!==null) state.watchKcal = Math.round(kcal);
    /* v96: whole-workout sync — the watch's session totals attach to today's latest workout */
    if(wkcal!==null || wavg!==null || wmax!==null){
      const lab = new Date().toLocaleString('en-US',{month:'short', day:'numeric'});
      let sess = state.history[lab];
      if(sess && sess.multi) sess = sess.sessions[sess.sessions.length-1];
      const watch = {};
      if(wkcal!==null){ watch.kcal = Math.round(wkcal); state.burned += Math.round(wkcal); state.burnLog = state.burnLog||[]; state.burnLog.push(Math.round(wkcal)); }
      if(wavg!==null) watch.avg = Math.round(wavg);
      if(wmax!==null) watch.max = Math.round(wmax);
      if(wmin!==null) watch.dur = Math.round(wmin);
      if(sess){ sess.watch = watch; }
      state.memory.unshift({ic:'⌚', t:`Watch workout sync${sess?` → ${sess.name.split(' · ')[0]}`:''}: ${watch.kcal?watch.kcal+' kcal':''}${watch.avg?` · avg ♥ ${watch.avg}`:''}${watch.max?` · peak ♥ ${watch.max}`:''}${watch.dur?` · ${watch.dur} min`:''}`});
    }
    if(sleep!==null){
      const lab = new Date().toLocaleString('en-US',{month:'short', day:'numeric'});
      state.sleepLog = (state.sleepLog||[]).filter(r=>r.d!==lab);
      state.sleepLog.push({d:lab, h:+sleep.toFixed(1)});
    }
    state.watchSync = { day: dayKey(new Date()), t: `${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2,'0')}`, sleep: state.recovery.sleep, rhr: state.recovery.rhr };
    /* re-apply today's plan so recovery/sleep adaptation uses REAL numbers */
    if(state.splitChosen || state.lastSplit) applyPreset(SCHED_KEY);
    history.replaceState(null, '', location.pathname);
    toast('⌚ Apple Watch synced');
    saveState();
    return true;
  }catch(e){ return false; }
}

/* a REAL new day: fresh macros, streak logic, schedule advance, wearable resync */
function realNewDay(){
  const d = new Date();
  const yest = new Date(d); yest.setDate(yest.getDate()-1);
  if(state.trainedDays.includes(dayKey(yest))) state.streak++;
  else if(yest.getDay()!==0) state.streak = 0;
  if(state.goalsKnown && state.macros.protein.v >= state.macros.protein.t) state.proteinStreak = (state.proteinStreak||0) + 1;
  else state.proteinStreak = 0;
  ['cal','protein','carbs','fat'].forEach(k=>{ if(state.macros[k]) state.macros[k].v = 0; });
  state.meals = []; state.mealIdx = 0; state.burned = 0; state.water = 0;
  state.weighedToday = false; state.sessRecorded = false;
  if(d.getDay()===1) state.workoutsWtd = 0;
  /* v100: recovery numbers come ONLY from a real watch sync — never invented.
     If the shortcut hasn't fired today, yesterday's real values simply persist. */
  if(state.splitChosen || state.lastSplit) applyPreset(SCHED_KEY);
  else state.planReady = false;
}

if(state.onboarded){
  if(bootNewDay) realNewDay();
  const synced = ingestWatchSync();
  updateHeader(); renderSprite(); renderTrain(); renderFuel(); renderProgress(); renderYou();
  showInput();
  setTimeout(()=>{
    if(bootNewDay){
      addMsg(`🌅 <b>${TODAY_NAME}</b> — new day, clean slate. ${state.hasWearable ? `Overnight sync: <b>${state.recovery.sleep}</b> sleep · recovery <b>${state.recovery.score}%</b>. ` : ''}Here's your briefing:`, 'bot');
      setTimeout(showBriefing, 700);
    } else {
      addMsg(`Welcome back, <b>${state.user.name}</b> — everything is exactly where you left it.`, 'bot');
      setTimeout(()=>showFlow('root'), 700);
    }
  }, 600);
} else {
  ingestWatchSync();
  setTimeout(showObForm, 600);
}
</script>
